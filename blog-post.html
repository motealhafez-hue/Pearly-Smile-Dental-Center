<!doctype html>
<html lang="ar" dir="rtl" data-page="blog_post">
  <head>
    <meta charset="UTF-8" />
    <!-- Under FastAPI /blog/{slug} the document path is /blog/… so relative "style.css" would wrongly resolve to /blog/style.css. Base "/" fixes assets for same-origin server; skip file://. -->
    <script>
      (function () {
        try {
          if (location.protocol === "file:") return;
          var b = document.createElement("base");
          b.href = "/";
          var head = document.head || document.getElementsByTagName("head")[0];
          if (head) {
            var meta = head.querySelector("meta[charset]");
            head.insertBefore(b, meta ? meta.nextSibling : head.firstChild);
          }
        } catch (e) {}
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="Pearly Smile Dental Center" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta property="og:type" content="article" />
    <meta property="og:site_name" content="Pearly Smile Dental Center" />
    <title data-translate="blogPageTitle">Blog | Pearly Smile</title>
    <meta name="description" data-translate="blogPageDescription" content="" />
    <link rel="canonical" href="blog.html" id="blog-canonical-link" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <script src="site-prefs-boot.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=blog-reader-v23" />
  </head>
  <body>
    <header class="mobile-nav">
      <div class="brand" data-translate="brand">Pearly Smile Dental Center</div>
      <nav id="mobileNav" aria-label="Primary">
        <button
          type="button"
          class="mobile-menu-backdrop"
          id="mobileMenuBackdrop"
          aria-label="Close menu"
        ></button>
        <div class="mobile-menu-panel" role="dialog" aria-modal="true" aria-label="Menu">
          <button
            type="button"
            class="mobile-menu-close"
            id="mobileMenuClose"
            aria-label="Close menu"
          >
            <span aria-hidden="true">✕</span>
          </button>
          <ul>
            <li><a href="index.html" data-translate="navHome">الرئيسية</a></li>
            <li><a href="index.html#stats" data-translate="navStats">إحصائيات</a></li>
            <li>
              <a href="services.html" data-translate="navServices">خدماتنا</a>
            </li>
            <li>
              <a href="offers.html" data-translate="navOffers">عروضنا</a>
            </li>
            <li><a href="blog.html" data-translate="navBlog" aria-current="page">Blog</a></li>
            <li><a href="team.html" data-translate="navTeam">فريقنا</a></li>
            <li><a href="about.html" data-translate="navAbout">عنّا</a></li>
            <li><a href="index.html#booking" data-translate="navBooking">حجز</a></li>
          </ul>
        </div>
      </nav>
      <div class="header-actions">
        <button
          type="button"
          id="mobileMenuToggle"
          class="mobile-menu-toggle"
          aria-controls="mobileNav"
          aria-expanded="false"
          aria-label="Open menu"
        >
          <span class="mobile-menu-icon" aria-hidden="true"></span>
        </button>
        <button
          type="button"
          id="themeToggle"
          class="theme-toggle"
          aria-label="Toggle theme"
        >
          🌙
        </button>
        <button type="button" id="languageToggle" class="lang-toggle">
          EN
        </button>
        <a href="tel:+966500000000" class="header-btn" data-translate="callNow"
          >اتصل الآن</a
        >
      </div>
    </header>

    <main class="blog-reader-main" id="blogPostMain">
      <article
        class="blog-reader-article"
        itemscope
        itemtype="https://schema.org/BlogPosting"
        id="blogPostingArticle"
      >
        <meta itemprop="inLanguage" content="ar" id="blogPostingLangMeta" />

        <!-- ── Editorial hero: normal scroll (not sticky), under nav, above featured image ── -->
        <section class="blog-reader-hero" aria-labelledby="blog-title">
          <div class="blog-reader-shell">
            <nav class="blog-reader-breadcrumb" aria-label="Breadcrumb">
              <a href="blog.html" class="blog-reader-breadcrumb__link" data-translate="blogBackToBlog"></a>
            </nav>

            <header class="blog-reader-header">
              <div class="blog-reader-meta-top">
                <span class="blog-reader-kicker" id="articleKicker" hidden></span>
              </div>

              <h1 class="blog-reader-title" id="blog-title" itemprop="headline" data-translate="blogLoading"></h1>
              <p class="blog-reader-lede" id="articleExcerpt" itemprop="description"></p>

              <div class="blog-reader-meta-row">
                <span class="blog-reader-author" data-translate="blogAuthorLabel"></span>
                <span class="blog-reader-meta-sep" aria-hidden="true">·</span>
                <time id="articlePublishedTime" class="blog-reader-date" datetime="" itemprop="datePublished" hidden></time>
                <span class="blog-reader-meta-sep blog-reader-meta-sep--read" aria-hidden="true" hidden>·</span>
                <span id="articleReadTime" class="blog-reader-readtime" hidden></span>
              </div>
            </header>
          </div>
        </section>

        <!-- ── Featured image: wider than reading column ── -->
        <figure class="blog-reader-featured-wrap" id="articleFeaturedFigure" hidden>
          <img
            id="articleFeaturedImg"
            alt=""
            loading="eager"
            decoding="async"
            class="blog-reader-featured__img"
            itemprop="image"
          />
        </figure>

        <!-- ── Article body ── -->
        <div class="blog-reader-shell">
          <div
            id="blog-content"
            class="blog-reader-prose"
            itemprop="articleBody"
            aria-live="polite"
          ></div>

          <!-- ── In-article CTA ── -->
          <section class="blog-reader-cta" aria-label="Book appointment">
            <div class="blog-reader-cta__inner">
              <div class="blog-reader-cta__copy">
                <h2 class="blog-reader-cta__title" data-translate="blogCtaTitle"></h2>
                <p class="blog-reader-cta__text" data-translate="blogCtaText"></p>
              </div>
              <div class="blog-reader-cta__actions">
                <a class="btn btn-primary" href="index.html#booking" data-translate="blogCtaBook"></a>
                <a class="btn btn-secondary" href="team.html" data-translate="blogCtaDoctors"></a>
              </div>
            </div>
          </section>
        </div>
      </article>

      <!-- ── Related posts ── -->
      <section class="offers-section blog-related-wrap" aria-labelledby="blog-related-heading">
        <div class="section-head section-head--solo-title">
          <h2 id="blog-related-heading" data-translate="blogRelatedTitle"></h2>
        </div>
        <div id="relatedGrid" class="blog-cards-grid blog-related-grid"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>© 2026 Pearly Smile Dental Center. All rights reserved.</p>
      </div>
    </footer>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "MedicalClinic",
            "name": "Pearly Smile Dental Center",
            "url": "/",
            "telephone": "+966500000000",
            "address": {
              "@type": "PostalAddress",
              "addressCountry": "SA",
              "addressLocality": "Riyadh"
            },
            "keywords": ["blog", "dental clinic", "dentist", "appointments"]
          },
          {
            "@type": "Dataset",
            "name": "Pearly Smile AI index",
            "description": "Machine-readable clinic content: services, doctors, offers, and blog posts.",
            "url": "/api/ai-index",
            "keywords": ["blog posts", "articles"]
          }
        ]
      }
    </script>

    <script src="site-data.js?v=blog-article-v4"></script>
    <script src="script.js?v=blog-article-v5"></script>
    <script src="blog.js?v=blog-reader-v20"></script>
  </body>
</html>
