<!doctype html>
<html lang="en" class="admin-root theme-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinic Console | Pearly Smile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .admin-root {
        --font-sans: "Inter", system-ui, sans-serif;
        --font-display: "Poppins", var(--font-sans);
        --radius: 14px;
        --radius-sm: 10px;
        --shadow: 0 8px 32px rgba(15, 23, 42, 0.12);
        --shadow-lg: 0 24px 48px rgba(15, 23, 42, 0.18);
        --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        --sidebar-w: 268px;
      }

      .admin-root.theme-dark {
        --bg0: #0c1222;
        --bg1: #111827;
        --surface: rgba(30, 41, 59, 0.55);
        --surface-solid: #1e293b;
        --glass-border: rgba(148, 163, 184, 0.12);
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --accent: #38bdf8;
        --accent-dim: rgba(56, 189, 248, 0.15);
        --success: #4ade80;
        --danger: #f87171;
        --warning: #fbbf24;
        --input-bg: rgba(15, 23, 42, 0.65);
        --topbar-bg: rgba(17, 24, 39, 0.72);
      }

      .admin-root.theme-light {
        --bg0: #f0f4f8;
        --bg1: #e2e8f0;
        --surface: rgba(255, 255, 255, 0.72);
        --surface-solid: #ffffff;
        --glass-border: rgba(15, 23, 42, 0.08);
        --text: #0f172a;
        --text-muted: #64748b;
        --accent: #0284c7;
        --accent-dim: rgba(2, 132, 199, 0.1);
        --success: #16a34a;
        --danger: #dc2626;
        --warning: #d97706;
        --input-bg: rgba(255, 255, 255, 0.95);
        --topbar-bg: rgba(255, 255, 255, 0.82);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--font-sans);
        background: linear-gradient(145deg, var(--bg0) 0%, var(--bg1) 48%, var(--bg0) 100%);
        background-attachment: fixed;
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* Prevent unwanted text selection/caret on admin UI */
      body,
      h1,
      h2,
      h3,
      h4,
      p,
      span,
      strong,
      div,
      article,
      section,
      button,
      a,
      label {
        -webkit-user-select: none;
        user-select: none;
        caret-color: transparent;
      }

      input,
      textarea,
      select,
      option {
        -webkit-user-select: text;
        user-select: text;
        caret-color: auto;
      }

      .glass {
        background: var(--surface);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow);
      }

      .glass-strong {
        background: var(--surface);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow-lg);
      }

      /* ——— Login ——— */
      .login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        animation: fadeIn 0.45s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        border-radius: calc(var(--radius) + 4px);
        padding: 2rem 2rem 1.75rem;
        animation: slideUp 0.5s ease;
      }

      .login-card h1 {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.35rem;
        letter-spacing: -0.02em;
      }

      .login-card .sub {
        color: var(--text-muted);
        font-size: 0.875rem;
        margin: 0 0 1.5rem;
        line-height: 1.5;
      }

      .login-card label {
        display: block;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      .login-card input {
        width: 100%;
        margin-bottom: 1rem;
      }

      /* ——— App shell ——— */
      .app-shell {
        display: flex;
        min-height: 100vh;
        animation: fadeIn 0.35s ease;
      }

      .sidebar {
        width: var(--sidebar-w);
        flex-shrink: 0;
        padding: 1.25rem 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        border-right: 1px solid var(--glass-border);
      }

      .sidebar-brand {
        padding: 0.5rem 0.85rem 1.25rem;
        border-bottom: 1px solid var(--glass-border);
        margin-bottom: 0.5rem;
      }

      .sidebar-brand .logo {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: -0.02em;
      }

      .sidebar-brand .tag {
        font-size: 0.7rem;
        color: var(--text-muted);
        margin-top: 0.2rem;
      }

      .nav-btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.65rem;
        width: 100%;
        padding: 0.65rem 0.9rem;
        border: none;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--text-muted);
        font: inherit;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        text-align: left;
        transition: background var(--transition), color var(--transition), transform 0.15s ease;
      }

      .nav-btn:hover {
        background: var(--accent-dim);
        color: var(--text);
        transform: translateX(2px);
      }

      .nav-btn.active {
        background: var(--accent-dim);
        color: var(--accent);
        font-weight: 600;
      }

      .nav-btn .ico {
        width: 1.25rem;
        text-align: center;
        opacity: 0.85;
      }

      .nav-btn__main {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        min-width: 0;
        text-align: left;
      }

      .nav-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 1.35rem;
        height: 1.35rem;
        padding: 0 0.38rem;
        font-size: 0.68rem;
        font-weight: 700;
        line-height: 1;
        color: #fff;
        background: var(--danger);
        border-radius: 999px;
        flex-shrink: 0;
      }

      .nav-badge[hidden] {
        display: none !important;
      }

      .sidebar-foot {
        margin-top: auto;
        padding-top: 1rem;
        border-top: 1px solid var(--glass-border);
      }

      .main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        padding: 0.85rem 1.35rem;
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        background: var(--topbar-bg);
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .menu-toggle {
        display: none;
        width: 42px;
        height: 42px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        font-size: 1.1rem;
      }

      .save-status {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-muted);
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        background: var(--accent-dim);
      }

      .save-status.saving {
        color: var(--warning);
      }

      .save-status.saved {
        color: var(--success);
      }

      .save-status.error {
        color: var(--danger);
      }

      .save-status .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        opacity: 0.85;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        padding: 0.55rem 1.1rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--surface);
        color: var(--text);
        font: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow var(--transition), background var(--transition);
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #0ea5e9);
        border-color: transparent;
        color: #fff;
      }

      .theme-light .btn-primary {
        color: #fff;
      }

      .btn-ghost {
        background: transparent;
      }

      .btn-danger {
        border-color: rgba(248, 113, 113, 0.35);
        color: var(--danger);
        background: rgba(248, 113, 113, 0.08);
      }

      .btn-icon {
        width: 42px;
        height: 42px;
        padding: 0;
        border-radius: var(--radius-sm);
      }

      .main-scroll {
        flex: 1;
        overflow: auto;
        padding: 1.35rem 1.5rem 2.5rem;
        animation: slideUp 0.4s ease;
      }

      .page-head {
        margin-bottom: 1.35rem;
      }

      .page-head h2 {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.35rem;
        letter-spacing: -0.02em;
      }

      .page-head p {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .grid-kpi {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      @media (max-width: 1100px) {
        .grid-kpi {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 520px) {
        .grid-kpi {
          grid-template-columns: 1fr;
        }
      }

      .kpi-card {
        border-radius: var(--radius);
        padding: 1.15rem 1.25rem;
        transition: transform var(--transition), box-shadow var(--transition);
      }

      .kpi-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
      }

      .kpi-card .label {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      .kpi-card .value {
        font-family: var(--font-display);
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .kpi-card .hint {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 0.35rem;
      }

      /* ——— Analytics dashboard ——— */
      .analytics-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 1.25rem;
      }

      .analytics-page {
        display: flex;
        flex-direction: column;
        gap: 1.75rem;
        animation: analyticsFadeIn 0.45s ease;
      }

      @keyframes analyticsFadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .analytics-section {
        margin: 0;
      }

      .analytics-section-head {
        margin-bottom: 1rem;
      }

      .analytics-section-title {
        font-family: var(--font-display);
        font-size: 1.05rem;
        font-weight: 700;
        margin: 0 0 0.35rem;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      .analytics-section-desc {
        margin: 0;
        font-size: 0.85rem;
        color: var(--text-muted);
        line-height: 1.5;
        max-width: 52rem;
      }

      .analytics-kpi-hero {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        margin-bottom: 0;
      }

      @media (max-width: 1200px) {
        .analytics-kpi-hero {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .analytics-kpi-hero {
          grid-template-columns: 1fr;
        }
      }

      .kpi-card .kpi-ico {
        font-size: 1.35rem;
        margin-bottom: 0.25rem;
        opacity: 0.9;
      }

      .analytics-grid-2 {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      @media (max-width: 900px) {
        .analytics-grid-2 {
          grid-template-columns: 1fr;
        }
      }

      .analytics-grid-3 {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
      }

      @media (max-width: 1000px) {
        .analytics-grid-3 {
          grid-template-columns: 1fr;
        }
      }

      .analytics-chart-panel canvas {
        display: block;
        width: 100%;
        max-height: 220px;
      }

      .analytics-funnel-rail {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 0.65rem;
      }

      .analytics-funnel-step {
        flex: 1 1 140px;
        min-width: 120px;
        padding: 1rem 0.85rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        position: relative;
        transition: transform var(--transition), border-color var(--transition);
      }

      .analytics-funnel-step:hover {
        transform: translateY(-2px);
        border-color: rgba(56, 189, 248, 0.35);
      }

      .analytics-funnel-step__n {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--text);
      }

      .analytics-funnel-step__l {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-top: 0.35rem;
      }

      .analytics-funnel-step__pct {
        font-size: 0.8rem;
        color: var(--accent);
        margin-top: 0.25rem;
        font-weight: 600;
      }

      .analytics-funnel-arrow {
        align-self: center;
        color: var(--text-muted);
        font-size: 1.1rem;
        flex: 0 0 auto;
      }

      @media (max-width: 700px) {
        .analytics-funnel-arrow {
          display: none;
        }
      }

      .analytics-css-bars {
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }

      .analytics-css-bar {
        display: grid;
        grid-template-columns: 2.5rem 1fr 2.5rem;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.78rem;
      }

      .analytics-css-bar .track {
        height: 8px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.15);
        overflow: hidden;
      }

      .analytics-css-bar .fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), rgba(56, 189, 248, 0.35));
        transition: width 0.6s ease;
      }

      .analytics-ai-panel {
        border-left: 3px solid var(--accent);
        padding-left: 1rem;
      }

      .analytics-ai-panel ul {
        margin: 0.5rem 0 0;
        padding-left: 1.15rem;
        color: var(--text);
        line-height: 1.65;
      }

      .analytics-ai-panel li {
        margin: 0.4rem 0;
      }

      .analytics-sub-kpi {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.75rem;
      }

      @media (max-width: 900px) {
        .analytics-sub-kpi {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 480px) {
        .analytics-sub-kpi {
          grid-template-columns: 1fr;
        }
      }

      .analytics-mini-stat {
        padding: 0.85rem 1rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
      }

      .analytics-mini-stat .lbl {
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
      }

      .analytics-mini-stat .val {
        font-family: var(--font-display);
        font-size: 1.2rem;
        font-weight: 700;
        margin-top: 0.25rem;
      }

      .analytics-tables-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      @media (max-width: 1100px) {
        .analytics-tables-grid {
          grid-template-columns: 1fr;
        }
      }

      .analytics-loading {
        animation: analyticsFadeIn 0.35s ease;
      }

      .card {
        border-radius: var(--radius);
        padding: 1.25rem 1.35rem;
        margin-bottom: 1rem;
        transition: box-shadow var(--transition);
      }

      .card:hover {
        box-shadow: var(--shadow);
      }

      .section-title {
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 600;
        margin: 0 0 1rem;
        color: var(--text);
      }

      .toolbar-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        align-items: center;
        margin-bottom: 1rem;
      }

      .search-input {
        flex: 1;
        min-width: 180px;
        max-width: 320px;
        padding: 0.55rem 0.85rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        color: var(--text);
        font: inherit;
        font-size: 0.875rem;
      }

      .search-input:focus {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      select.filter-select {
        padding: 0.55rem 0.75rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        color: var(--text);
        font: inherit;
        font-size: 0.8rem;
        cursor: pointer;
      }

      label.floating-label,
      .floating-label {
        display: block;
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      input.field,
      textarea.field {
        width: 100%;
        padding: 0.55rem 0.75rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        color: var(--text);
        font: inherit;
        font-size: 0.875rem;
        transition: border-color var(--transition), box-shadow var(--transition);
      }

      input.field:focus,
      textarea.field:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }

      textarea.field {
        min-height: 4.5rem;
        resize: vertical;
      }

      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.85rem;
      }

      @media (max-width: 640px) {
        .row-2 {
          grid-template-columns: 1fr;
        }
      }

      .item {
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        padding: 1rem 1.1rem;
        margin-bottom: 0.75rem;
        background: var(--input-bg);
        transition: border-color var(--transition);
      }

      .item:hover {
        border-color: rgba(56, 189, 248, 0.25);
      }

      .item-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 0.75rem;
        margin-bottom: 0.85rem;
        flex-wrap: wrap;
      }

      .item-head strong {
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
      }

      table.data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }

      .data-table th,
      .data-table td {
        padding: 0.75rem 1rem;
        text-align: left;
        border-bottom: 1px solid var(--glass-border);
      }

      .data-table th {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        font-weight: 600;
        background: var(--accent-dim);
      }

      .data-table tr:last-child td {
        border-bottom: none;
      }

      .data-table tbody tr {
        transition: background var(--transition);
      }

      .data-table tbody tr:hover {
        background: var(--accent-dim);
      }

      .pill-status {
        display: inline-block;
        padding: 0.2rem 0.45rem;
        font-size: 0.65rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border-radius: 6px;
      }

      .pill-status--new {
        background: rgba(248, 113, 113, 0.25);
        color: #fecaca;
      }

      .pill-status--viewed {
        background: var(--accent-dim);
        color: var(--text-muted);
      }

      .phone-link {
        color: var(--accent);
        font-weight: 600;
        text-decoration: none;
      }

      .phone-link:hover {
        text-decoration: underline;
      }

      .td-phone-wrap {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.35rem 0.5rem;
        min-width: 140px;
      }

      .td-phone-wrap .field {
        flex: 1;
        min-width: 100px;
      }

      .mono-ts {
        font-size: 0.78rem;
        color: var(--text-muted);
        white-space: nowrap;
      }

      /* Bookings tab — readable cards (no cramped table) */
      .bookings-wrap {
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        padding: 1rem;
        background: var(--accent-dim);
      }

      .bookings-list {
        display: flex;
        flex-direction: column;
        gap: 1.1rem;
      }

      .booking-card {
        border-radius: var(--radius);
        border: 1px solid var(--glass-border);
        padding: 1.2rem 1.35rem;
        background: var(--input-bg);
        box-shadow: var(--shadow);
        transition: border-color var(--transition), box-shadow var(--transition);
      }

      .booking-card:hover {
        border-color: rgba(56, 189, 248, 0.22);
      }

      .booking-card input,
      .booking-card textarea,
      .booking-card select {
        -webkit-user-select: text;
        user-select: text;
      }

      .booking-card.booking-row--new {
        box-shadow: inset 3px 0 0 var(--danger), var(--shadow);
        background: rgba(248, 113, 113, 0.06);
        border-color: rgba(248, 113, 113, 0.2);
      }

      .admin-root.theme-light .booking-card.booking-row--new {
        background: rgba(220, 38, 38, 0.05);
      }

      .booking-card__head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        margin-bottom: 1rem;
        padding-bottom: 0.85rem;
        border-bottom: 1px solid var(--glass-border);
      }

      .booking-card__head .booking-status {
        min-width: 8rem;
      }

      .booking-card__primary {
        margin-bottom: 1.1rem;
      }

      .booking-label {
        display: block;
        font-size: 0.68rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      .booking-card .field--patient,
      .booking-card textarea.field[data-k="patient_name"] {
        width: 100%;
        min-height: 3.1rem;
        padding: 0.65rem 0.85rem;
        font-size: 1.02rem;
        font-weight: 600;
        line-height: 1.45;
        resize: vertical;
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow-wrap: anywhere;
      }

      .booking-card textarea.field[data-k="notes"] {
        width: 100%;
        min-height: 4rem;
        padding: 0.65rem 0.85rem;
        font-size: 0.9rem;
        line-height: 1.5;
        resize: vertical;
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow-wrap: anywhere;
      }

      .booking-card__grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem 1.25rem;
        margin-bottom: 1rem;
      }

      .booking-field .field {
        width: 100%;
        padding: 0.55rem 0.75rem;
        font-size: 0.9rem;
        line-height: 1.45;
      }

      .booking-card .td-phone-wrap {
        min-width: 0;
        margin-top: 0.15rem;
      }

      .booking-card .td-phone-wrap .field {
        min-width: 0;
        flex: 1 1 12rem;
        max-width: 100%;
        padding: 0.55rem 0.75rem;
        font-size: 0.95rem;
      }

      .booking-card__booked {
        font-size: 0.82rem;
        color: var(--text-muted);
        line-height: 1.5;
        word-break: break-word;
        margin-bottom: 1rem;
        padding: 0.5rem 0.65rem;
        border-radius: var(--radius-sm);
        background: var(--accent-dim);
      }

      .booking-card__booked strong {
        color: var(--text);
        font-weight: 600;
      }

      @media (max-width: 720px) {
        .booking-card__grid {
          grid-template-columns: 1fr;
        }

        .booking-card {
          padding: 1rem 1rem;
        }
      }

      .empty-hint {
        text-align: center;
        padding: 2rem 1rem;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .help-text {
        margin: -0.5rem 0 0.75rem;
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      .pill {
        display: inline-block;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 600;
        background: var(--accent-dim);
        color: var(--accent);
      }

      /* Uploader (shared) */
      .uploader {
        --uploader-w: 72px;
        --uploader-h: 72px;
        display: flex;
        gap: 0.65rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .uploader-preview {
        width: var(--uploader-w);
        height: var(--uploader-h);
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        overflow: hidden;
        flex: 0 0 auto;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 0.75rem;
      }

      .uploader-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .uploader-status {
        position: absolute;
        right: 8px;
        bottom: 8px;
        display: none;
      }

      .uploader-drop {
        flex: 1;
        min-height: var(--uploader-h);
        border-radius: var(--radius-sm);
        border: 1px dashed var(--glass-border);
        background: rgba(2, 132, 199, 0.05);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.65rem 0.75rem;
        min-width: 220px;
      }

      .uploader-drop .title {
        font-weight: 700;
      }

      .uploader-drop .sub {
        color: var(--text-muted);
        font-size: 0.8rem;
      }

      .uploader-drop.is-dragover {
        border-color: rgba(56, 189, 248, 0.55);
        background: rgba(56, 189, 248, 0.06);
      }

      @media (max-width: 520px) {
        .uploader-drop {
          min-width: 100%;
        }
      }

      .doctor-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      .doctor-chip {
        border-radius: var(--radius-sm);
        padding: 0.75rem 1rem;
        min-width: 140px;
        flex: 1 1 160px;
        max-width: 220px;
        transition: transform var(--transition), box-shadow var(--transition);
      }

      .doctor-chip:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
      }

      .doctor-chip .n {
        font-weight: 600;
        font-size: 0.88rem;
        margin-bottom: 0.2rem;
      }

      .doctor-chip .r {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .quick-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.85rem;
      }

      @media (max-width: 720px) {
        .quick-grid {
          grid-template-columns: 1fr;
        }
      }

      .analytics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
      }

      .stat-block {
        border-radius: var(--radius-sm);
        padding: 1rem 1.1rem;
        text-align: center;
      }

      .stat-block .num {
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent);
      }

      .stat-block .lbl {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
      }

      /* Mobile sidebar */
      @media (max-width: 900px) {
        .menu-toggle {
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }

        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          z-index: 100;
          transform: translateX(-102%);
          transition: transform var(--transition);
          box-shadow: var(--shadow-lg);
        }

        .sidebar.open {
          transform: translateX(0);
        }

        .sidebar-backdrop {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.45);
          z-index: 99;
          backdrop-filter: blur(2px);
        }

        .sidebar-backdrop.show {
          display: block;
        }
      }

      /* Toasts */
      .toast-stack {
        position: fixed;
        bottom: 1.25rem;
        right: 1.25rem;
        z-index: 200;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        max-width: min(400px, 92vw);
        pointer-events: none;
      }

      .toast {
        padding: 0.75rem 1.1rem;
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        font-weight: 500;
        box-shadow: var(--shadow-lg);
        transform: translateX(120%);
        opacity: 0;
        transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.3s ease;
        pointer-events: auto;
        border: 1px solid var(--glass-border);
      }

      .toast.show {
        transform: translateX(0);
        opacity: 1;
      }

      .toast.ok {
        background: rgba(22, 101, 52, 0.92);
        color: #ecfdf5;
        border-color: rgba(74, 222, 128, 0.35);
      }

      .toast.err {
        background: rgba(127, 29, 29, 0.92);
        color: #fef2f2;
        border-color: rgba(248, 113, 113, 0.35);
      }

      .login-error {
        color: var(--danger);
        font-size: 0.85rem;
        margin-top: 0.5rem;
      }

      a.link-site {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.875rem;
      }

      a.link-site:hover {
        text-decoration: underline;
      }

      .hidden {
        display: none !important;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      .login-card code,
      .sub code {
        font-size: 0.85em;
        padding: 0.1em 0.35em;
        border-radius: 4px;
        background: var(--accent-dim);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div id="loginScreen" class="login-screen">
      <div class="login-card glass-strong">
        <h1>Pearly Smile</h1>
        <p class="sub">Clinic console — manage public site content. Saves to <code>api/data.json</code> on the server.</p>
        <label for="u">Username</label>
        <input id="u" class="field" autocomplete="username" />
        <label for="p">Password</label>
        <input id="p" class="field" type="password" autocomplete="current-password" />
        <p class="sub" style="margin-bottom: 1rem; font-size: 0.8rem">
          Default: <strong>admin</strong> / <strong>pearly-admin</strong>
        </p>
        <button type="button" class="btn btn-primary" id="btnLogin" style="width: 100%">Sign in</button>
        <p class="login-error" id="loginErr"></p>
      </div>
    </div>

    <div id="appDash" class="app-shell hidden">
      <div class="sidebar-backdrop" id="sidebarBackdrop" aria-hidden="true"></div>
      <aside class="sidebar glass" id="sidebar">
        <div class="sidebar-brand">
          <div class="logo">Pearly Smile</div>
          <div class="tag">Dental · Admin</div>
        </div>
        <nav class="sidebar-nav" id="sidebarNav" aria-label="Main"></nav>
        <div class="sidebar-foot">
          <button type="button" class="nav-btn" id="btnLogout">
            <span class="ico">⎋</span> Log out
          </button>
          <a class="nav-btn" href="index.html" style="text-decoration: none; color: inherit">
            <span class="ico">↗</span> View website
          </a>
        </div>
      </aside>

      <div class="main-area">
        <header class="topbar">
          <div class="topbar-left">
            <button type="button" class="menu-toggle glass" id="menuToggle" aria-label="Open menu">☰</button>
            <div id="saveStatus" class="save-status" aria-live="polite">
              <span class="dot"></span>
              <span id="saveStatusText">Saved</span>
            </div>
          </div>
          <div class="topbar-actions">
            <button type="button" class="btn btn-ghost" id="btnReload" title="Reload from server">Reload</button>
            <button type="button" class="btn btn-primary" id="btnSave">Save changes</button>
            <button type="button" class="btn btn-icon glass" id="btnTheme" title="Toggle theme">◐</button>
          </div>
        </header>
        <div class="main-scroll">
          <div class="page-head" id="pageHead"></div>
          <div id="mainContent"></div>
        </div>
      </div>
    </div>

    <div class="toast-stack" id="toastStack" aria-live="polite"></div>

    <script>
      (function () {
        const TOKEN_KEY = "ps_admin_token";
        const THEME_KEY = "ps_admin_theme";

        const apiBase = (function () {
          try {
            return location.protocol === "file:" ? "http://127.0.0.1:8000" : location.origin;
          } catch (e) {
            return "http://127.0.0.1:8000";
          }
        })();

        let state = null;
        let token = sessionStorage.getItem(TOKEN_KEY);
        let activeRoute = "overview";
        let dirty = false;
        let saveState = "saved";

        const $ = (id) => document.getElementById(id);

        function setTheme(dark) {
          const root = document.documentElement;
          root.classList.toggle("theme-dark", dark);
          root.classList.toggle("theme-light", !dark);
          localStorage.setItem(THEME_KEY, dark ? "dark" : "light");
        }

        function initTheme() {
          const t = localStorage.getItem(THEME_KEY);
          if (t === "light") setTheme(false);
          else setTheme(true);
        }
        initTheme();

        $("btnTheme").addEventListener("click", () => {
          const dark = !document.documentElement.classList.contains("theme-dark");
          setTheme(dark);
        });

        function markDirty() {
          dirty = true;
          saveState = "unsaved";
          updateSaveStatus();
        }

        function markSaved() {
          dirty = false;
          saveState = "saved";
          updateSaveStatus();
        }

        function updateSaveStatus() {
          const el = $("saveStatus");
          const txt = $("saveStatusText");
          el.classList.remove("saving", "saved", "error");
          if (saveState === "saving") {
            el.classList.add("saving");
            txt.textContent = "Saving…";
          } else if (saveState === "error") {
            el.classList.add("error");
            txt.textContent = "Save failed";
          } else if (dirty) {
            txt.textContent = "Unsaved changes";
          } else {
            el.classList.add("saved");
            txt.textContent = "Saved";
          }
        }

        function showToast(msg, ok) {
          const stack = $("toastStack");
          const t = document.createElement("div");
          t.className = "toast " + (ok ? "ok" : "err");
          t.textContent = msg;
          stack.appendChild(t);
          requestAnimationFrame(() => t.classList.add("show"));
          setTimeout(() => {
            t.classList.remove("show");
            setTimeout(() => t.remove(), 350);
          }, 3200);
        }

        function authHeaders() {
          const h = { "Content-Type": "application/json" };
          if (token) h["Authorization"] = "Bearer " + token;
          return h;
        }

        async function apiGet() {
          const r = await fetch(apiBase + "/api/data");
          if (!r.ok) throw new Error("Failed to load data");
          return r.json();
        }

        async function apiSave(body) {
          const r = await fetch(apiBase + "/api/data", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(body),
          });
          if (r.status === 401) {
            token = null;
            sessionStorage.removeItem(TOKEN_KEY);
            throw new Error("Session expired — sign in again");
          }
          if (!r.ok) {
            const t = await r.text();
            throw new Error(t || "Save failed");
          }
          return r.json();
        }

        async function apiLogin(user, pass) {
          const r = await fetch(apiBase + "/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: user, password: pass }),
          });
          if (!r.ok) throw new Error("Invalid credentials");
          const j = await r.json();
          return j.token;
        }

        // -----------------------------
        // Bookings API (separate store)
        // -----------------------------
        let bookingsCache = [];

        async function apiGetBookings() {
          const r = await fetch(apiBase + "/api/bookings", { headers: authHeaders() });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to load bookings");
          const rows = await r.json();
          return Array.isArray(rows) ? rows : [];
        }

        async function apiUpsertBooking(booking) {
          const r = await fetch(apiBase + "/api/bookings", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(booking),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) {
            const t = await r.text();
            throw new Error(t || "Failed to save booking");
          }
          return r.json();
        }

        async function apiDeleteBooking(id) {
          const r = await fetch(apiBase + "/api/bookings/" + encodeURIComponent(id), {
            method: "DELETE",
            headers: authHeaders(),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (r.status === 404) throw new Error("Booking not found");
          if (!r.ok) throw new Error("Failed to delete booking");
          return r.json();
        }

        function countNewBookings() {
          return bookingsCache.filter((b) => b && String(b.status || "") === "new").length;
        }

        function updateBookingsBadge() {
          const el = $("navBadgeBookings");
          if (!el) return;
          const n = countNewBookings();
          el.textContent = n > 99 ? "99+" : String(n || "");
          if (n > 0) el.removeAttribute("hidden");
          else el.setAttribute("hidden", "");
        }

        async function refreshBookings() {
          bookingsCache = await apiGetBookings();
          updateBookingsBadge();
          return bookingsCache;
        }

        async function apiMarkBookingsViewed() {
          const r = await fetch(apiBase + "/api/bookings/mark-viewed", {
            method: "POST",
            headers: authHeaders(),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to update booking flags");
          return r.json();
        }

        let bookingsPollId = null;

        function startBookingsPolling() {
          if (bookingsPollId) clearInterval(bookingsPollId);
          bookingsPollId = setInterval(async () => {
            if (!token) return;
            try {
              await refreshBookings();
              if (activeRoute === "bookings" && typeof window.__repaintBookingsTable === "function") {
                window.__repaintBookingsTable();
              }
            } catch (e) {}
          }, 12000);
        }

        function stopBookingsPolling() {
          if (bookingsPollId) {
            clearInterval(bookingsPollId);
            bookingsPollId = null;
          }
        }

        // -----------------------------
        // Events API (separate store)
        // -----------------------------
        async function apiPostEvent(evt) {
          try {
            const r = await fetch(apiBase + "/api/events", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify(evt),
            });
            return r.ok;
          } catch (e) {
            return false;
          }
        }

        async function apiGetEvents() {
          const r = await fetch(apiBase + "/api/events", { headers: authHeaders() });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to load events");
          const rows = await r.json();
          return Array.isArray(rows) ? rows : [];
        }

        // -----------------------------
        // Blog API (separate store)
        // -----------------------------
        async function apiAdminGetBlog() {
          const r = await fetch(apiBase + "/api/admin/blog", { headers: authHeaders() });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to load blog posts");
          const rows = await r.json();
          return Array.isArray(rows) ? rows : [];
        }

        async function apiAdminCreateBlog(post) {
          const r = await fetch(apiBase + "/api/admin/blog", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(post),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (r.status === 409) throw new Error("Slug already exists");
          if (!r.ok) throw new Error("Failed to create post");
          return r.json();
        }

        async function apiAdminUpdateBlog(slug, post) {
          const r = await fetch(apiBase + "/api/admin/blog/" + encodeURIComponent(slug), {
            method: "PUT",
            headers: authHeaders(),
            body: JSON.stringify(post),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (r.status === 409) throw new Error("Slug already exists");
          if (r.status === 404) throw new Error("Post not found");
          if (!r.ok) throw new Error("Failed to update post");
          return r.json();
        }

        async function apiAdminDeleteBlog(slug) {
          const r = await fetch(apiBase + "/api/admin/blog/" + encodeURIComponent(slug), {
            method: "DELETE",
            headers: authHeaders(),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (r.status === 404) throw new Error("Post not found");
          if (!r.ok) throw new Error("Failed to delete post");
          return r.json();
        }

        async function apiGenerateBlog(topic) {
          const r = await fetch(apiBase + "/api/generate-blog", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({ topic: topic || null }),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) {
            let msg = "Failed to generate blog";
            try {
              const j = await r.json();
              if (j && j.detail) msg = String(j.detail);
            } catch (e) {}
            throw new Error(msg);
          }
          return r.json();
        }

        function track(type, fields) {
          apiPostEvent(Object.assign({ type }, fields || {}));
        }

        async function uploadImageFile(file) {
          const fd = new FormData();
          fd.append("file", file);
          const r = await fetch(apiBase + "/api/upload", {
            method: "POST",
            headers: token ? { Authorization: "Bearer " + token } : {},
            body: fd,
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) {
            let msg = "Upload failed";
            try {
              const j = await r.json();
              if (j && j.detail) msg = String(j.detail);
            } catch (e) {}
            throw new Error(msg);
          }
          const j = await r.json();
          if (!j || !j.url) throw new Error("Upload failed: missing url");
          // Return absolute URL for convenience
          return j.url.startsWith("http") ? j.url : apiBase + j.url;
        }

        function createImageUploader(opts) {
          const get = opts.get;
          const set = opts.set;
          const label = opts.label || "Image";
          const size = opts.size || { w: 72, h: 72 };

          const wrap = document.createElement("div");
          const lab = document.createElement("span");
          lab.className = "floating-label";
          lab.textContent = label;
          wrap.appendChild(lab);

          const row = document.createElement("div");
          row.className = "uploader";
          row.style.setProperty("--uploader-w", String(size.w) + "px");
          row.style.setProperty("--uploader-h", String(size.h) + "px");

          const preview = document.createElement("div");
          preview.className = "uploader-preview";

          const status = document.createElement("span");
          status.className = "pill uploader-status";
          preview.appendChild(status);

          const drop = document.createElement("div");
          drop.className = "uploader-drop";
          drop.innerHTML =
            '<div style="min-width:0"><div class="title">Drag & drop</div><div class="sub">or use the button</div></div>';

          const inp = document.createElement("input");
          inp.type = "file";
          inp.accept = "image/*";
          inp.style.display = "none";

          const btnUp = document.createElement("button");
          btnUp.type = "button";
          btnUp.className = "btn btn-ghost";

          const btnClear = document.createElement("button");
          btnClear.type = "button";
          btnClear.className = "btn btn-ghost";
          btnClear.textContent = "Remove";

          let localPreviewUrl = "";
          let busy = false;

          function paintPreview() {
            const url = get() ? String(get()) : "";
            const showUrl = localPreviewUrl || url;
            preview.querySelectorAll("img").forEach((n) => n.remove());
            const oldTxt = preview.querySelector(".uploader-empty");
            if (oldTxt) oldTxt.remove();

            if (showUrl) {
              const img = document.createElement("img");
              img.alt = "";
              img.src = showUrl;
              preview.insertBefore(img, status);
              btnUp.textContent = "Change image";
            } else {
              const t = document.createElement("div");
              t.className = "uploader-empty";
              t.textContent = "No image";
              preview.insertBefore(t, status);
              btnUp.textContent = "Upload image";
            }
          }

          function setStatus(kind, text) {
            status.style.display = "inline-block";
            status.textContent = text;
            if (kind === "warn") {
              status.style.background = "rgba(251, 191, 36, 0.15)";
              status.style.color = "var(--warning)";
            } else if (kind === "ok") {
              status.style.background = "rgba(74, 222, 128, 0.14)";
              status.style.color = "var(--success)";
            } else if (kind === "err") {
              status.style.background = "rgba(248, 113, 113, 0.14)";
              status.style.color = "var(--danger)";
            } else {
              status.style.background = "var(--accent-dim)";
              status.style.color = "var(--accent)";
            }
          }

          async function handleFile(file) {
            if (!file) return;
            if (busy) return;
            busy = true;
            btnUp.disabled = true;
            btnClear.disabled = true;
            setStatus("warn", "Uploading…");

            if (localPreviewUrl) {
              try {
                URL.revokeObjectURL(localPreviewUrl);
              } catch (e) {}
              localPreviewUrl = "";
            }
            try {
              localPreviewUrl = URL.createObjectURL(file);
            } catch (e) {
              localPreviewUrl = "";
            }
            paintPreview();

            try {
              const url = await uploadImageFile(file);
              set(url);
              if (localPreviewUrl) {
                try {
                  URL.revokeObjectURL(localPreviewUrl);
                } catch (e) {}
                localPreviewUrl = "";
              }
              paintPreview();
              markDirty();
              showToast("Image uploaded", true);
              setStatus("ok", "Saved");
              setTimeout(() => (status.style.display = "none"), 1400);
            } catch (e) {
              showToast(e.message || "Upload failed", false);
              setStatus("err", "Failed");
            }

            busy = false;
            btnUp.disabled = false;
            btnClear.disabled = false;
          }

          btnUp.addEventListener("click", () => inp.click());
          inp.addEventListener("change", () => {
            const file = inp.files && inp.files[0];
            inp.value = "";
            handleFile(file);
          });

          btnClear.addEventListener("click", () => {
            set("");
            if (localPreviewUrl) {
              try {
                URL.revokeObjectURL(localPreviewUrl);
              } catch (e) {}
              localPreviewUrl = "";
            }
            paintPreview();
            markDirty();
          });

          drop.addEventListener("dragover", (e) => {
            e.preventDefault();
            drop.classList.add("is-dragover");
          });
          drop.addEventListener("dragleave", () => {
            drop.classList.remove("is-dragover");
          });
          drop.addEventListener("drop", (e) => {
            e.preventDefault();
            drop.classList.remove("is-dragover");
            const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
            handleFile(file);
          });

          paintPreview();

          row.appendChild(preview);
          row.appendChild(drop);
          row.appendChild(btnUp);
          row.appendChild(btnClear);
          wrap.appendChild(row);
          wrap.appendChild(inp);
          return wrap;
        }

        function renderBlog(root) {
          setPageHead("Blog", "Create and publish SEO-friendly posts. Stored on the server.");

          const shell = document.createElement("div");
          shell.className = "card glass";
          shell.innerHTML =
            '<h3 class="section-title">Posts</h3><p style="margin:-0.5rem 0 1rem;font-size:0.85rem;color:var(--text-muted);line-height:1.5">الموقع العام: <code>/blog</code> و <code>/blog/&lt;slug&gt;</code> — نفس الحقول في الـ API: <code>content_html</code> (نص المقال)، <code>hero_image</code> (الصورة)، <code>meta_title</code> / <code>meta_description</code> (SEO).<br/>Public: listing <code>GET /api/blog</code>, article <code>GET /api/blog/{slug}</code> — same fields as this editor.</p>';
          root.appendChild(shell);

          const toolbar = document.createElement("div");
          toolbar.className = "toolbar-inline";
          const search = document.createElement("input");
          search.type = "search";
          search.className = "search-input";
          search.placeholder = "Search title, tag, slug…";
          toolbar.appendChild(search);

          const btnNew = document.createElement("button");
          btnNew.type = "button";
          btnNew.className = "btn btn-primary";
          btnNew.textContent = "+ New post";
          toolbar.appendChild(btnNew);

          const btnAi = document.createElement("button");
          btnAi.type = "button";
          btnAi.className = "btn btn-ghost";
          btnAi.textContent = "Generate AI Blog";
          toolbar.appendChild(btnAi);
          shell.appendChild(toolbar);

          const listHost = document.createElement("div");
          shell.appendChild(listHost);

          const editor = document.createElement("div");
          editor.className = "card glass";
          editor.innerHTML = '<h3 class="section-title">Editor</h3>';
          root.appendChild(editor);

          let posts = [];
          let active = null;
          /** Slug of the post when editor opened — PUT must use this URL even if user renames slug in the form. */
          let activeOriginalSlug = null;

          function slugify(s) {
            s = String(s || "").trim().toLowerCase();
            let out = "";
            let dash = false;
            for (const ch of s) {
              const ok = (ch >= "a" && ch <= "z") || (ch >= "0" && ch <= "9");
              if (ok) {
                out += ch;
                dash = false;
              } else if (!dash) {
                out += "-";
                dash = true;
              }
            }
            out = out.replace(/^-+|-+$/g, "");
            return out || "post-" + Date.now();
          }

          function paintList() {
            listHost.innerHTML = "";
            const q = String(search.value || "").trim().toLowerCase();
            const rows = posts.filter((p) => {
              if (!p) return false;
              if (!q) return true;
              const hay = JSON.stringify(p).toLowerCase();
              return hay.includes(q);
            });
            if (!rows.length) {
              listHost.innerHTML = '<div class="empty-hint">No posts yet.</div>';
              return;
            }
            const tw = document.createElement("div");
            tw.className = "table-wrap";
            tw.innerHTML =
              '<table class="data-table"><thead><tr><th>Title</th><th>Slug</th><th>Tag</th><th>Status</th><th>Updated</th><th></th></tr></thead><tbody>' +
              rows
                .map((p) => {
                  const st = p.published === false ? "Draft" : "Published";
                  const title = p.title && typeof p.title === "object" ? (p.title.en || p.title.ar || "Untitled") : (p.title || "Untitled");
                  const tag = p.tag && typeof p.tag === "object" ? (p.tag.en || p.tag.ar || "—") : (p.tag || "—");
                  return (
                    "<tr>" +
                    "<td>" +
                    escapeHtml(title) +
                    "</td><td><code>" +
                    escapeHtml(p.slug || "") +
                    "</code></td><td>" +
                    escapeHtml(tag) +
                    "</td><td><span class=\"pill\">" +
                    escapeHtml(st) +
                    "</span></td><td>" +
                    escapeHtml((p.updated_at || p.published_at || "").slice(0, 10) || "—") +
                    "</td><td>" +
                    "<button type=\"button\" class=\"btn btn-ghost edit\" data-slug=\"" +
                    escapeHtml(p.slug || "") +
                    "\">Edit</button> " +
                    "<button type=\"button\" class=\"btn btn-danger del\" data-slug=\"" +
                    escapeHtml(p.slug || "") +
                    "\">Delete</button>" +
                    "</td></tr>"
                  );
                })
                .join("") +
              "</tbody></table>";
            listHost.appendChild(tw);

            tw.querySelectorAll("button.edit").forEach((b) => {
              b.addEventListener("click", () => {
                const slug = b.getAttribute("data-slug") || "";
                active = posts.find((p) => String(p.slug) === slug) || null;
                activeOriginalSlug = active ? String(active.slug) : null;
                paintEditor();
              });
            });
            tw.querySelectorAll("button.del").forEach((b) => {
              b.addEventListener("click", async () => {
                const slug = b.getAttribute("data-slug") || "";
                if (!slug) return;
                if (!confirm("Delete this post?")) return;
                try {
                  await apiAdminDeleteBlog(slug);
                  showToast("Post deleted", true);
                  posts = await apiAdminGetBlog();
                  if (active && String(active.slug) === slug) {
                    active = null;
                    activeOriginalSlug = null;
                  }
                  paintList();
                  paintEditor();
                } catch (e) {
                  showToast(e.message || "Delete failed", false);
                }
              });
            });
          }

          function editorField(label, value, onInput, opts) {
            const wrap = document.createElement("div");
            const lab = document.createElement("span");
            lab.className = "floating-label";
            lab.textContent = label;
            wrap.appendChild(lab);
            const multiline = opts && opts.multiline;
            const el = multiline ? document.createElement("textarea") : document.createElement("input");
            el.className = "field";
            if (multiline) el.style.minHeight = opts.height || "10rem";
            el.value = value != null ? String(value) : "";
            el.addEventListener("input", () => onInput(el.value));
            wrap.appendChild(el);
            return wrap;
          }

          function paintEditor() {
            editor.innerHTML = '<h3 class="section-title">Editor</h3>';
            if (!active) {
              editor.innerHTML +=
                '<div class="empty-hint">Select a post to edit, or create a new post.</div>';
              return;
            }

            const row = active;
            const grid = document.createElement("div");
            grid.className = "row-2";

            grid.appendChild(
              textLang("Title · AR", "Title · EN", row.title || { ar: "", en: "" }, (lang, val) => {
                if (!row.title || typeof row.title !== "object") row.title = { ar: "", en: "" };
                row.title[lang] = val;
                if (!row.slug) row.slug = slugify(row.title.en || row.title.ar || "");
              })
            );
            grid.appendChild(
              editorField("Slug (SEO)", row.slug || "", (v) => {
                row.slug = slugify(v);
              })
            );
            editor.appendChild(grid);

            editor.appendChild(
              textLang("Excerpt · AR", "Excerpt · EN", row.excerpt || { ar: "", en: "" }, (lang, val) => {
                if (!row.excerpt || typeof row.excerpt !== "object") row.excerpt = { ar: "", en: "" };
                row.excerpt[lang] = val;

            const grid2 = document.createElement("div");
            grid2.className = "row-2";
            grid2.appendChild(
              textLang("Tag · AR", "Tag · EN", row.tag || { ar: "", en: "" }, (lang, val) => {
                if (!row.tag || typeof row.tag !== "object") row.tag = { ar: "", en: "" };
                row.tag[lang] = val;
              })
            );
            grid2.appendChild(
              editorField("Read time (minutes)", row.read_time || "", (v) => {
                row.read_time = Number(v) || null;
              })
            );
            editor.appendChild(grid2);

            editor.appendChild(
              editorField("Hero image URL", row.hero_image || "", (v) => {
                row.hero_image = v;
              })
            );

            // Hero image uploader (drag & drop + preview)
            (function () {
              const up = createImageUploader({
                label: "Hero image upload",
                size: { w: 140, h: 90 },
                get: () => row.hero_image,
                set: (v) => {
                  row.hero_image = v;
                },
              });
              up.classList.add("item");
              editor.appendChild(up);
            })();
            editor.appendChild(
              textLang("Meta title · AR", "Meta title · EN", row.meta_title || { ar: "", en: "" }, (lang, val) => {
                if (!row.meta_title || typeof row.meta_title !== "object") row.meta_title = { ar: "", en: "" };
                row.meta_title[lang] = val;
              })
            );
            editor.appendChild(
              textLang("Meta description · AR", "Meta description · EN", row.meta_description || { ar: "", en: "" }, (lang, val) => {
                if (!row.meta_description || typeof row.meta_description !== "object") row.meta_description = { ar: "", en: "" };
                row.meta_description[lang] = val;

              editorField(

                    .split(",")

        function renderAnalytics(root) {
          setPageHead("Analytics", "Sessions, journeys, and bookings — optimized for decisions.");
          root.innerHTML = "";
          const bookings = bookingsCache || [];

          const toolbar = document.createElement("div");
          toolbar.className = "analytics-toolbar";

          const refreshBtn = document.createElement("button");
