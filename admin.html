<!doctype html>
<html lang="en" class="admin-root theme-dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinic Console | Pearly Smile</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      .admin-root {
        --font-sans: "Inter", system-ui, sans-serif;
        --font-display: "Poppins", var(--font-sans);
        --radius: 14px;
        --radius-sm: 10px;
        --shadow: 0 8px 32px rgba(15, 23, 42, 0.12);
        --shadow-lg: 0 24px 48px rgba(15, 23, 42, 0.18);
        --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
        --sidebar-w: 268px;
      }

      .admin-root.theme-dark {
        --bg0: #0c1222;
        --bg1: #111827;
        --surface: rgba(30, 41, 59, 0.55);
        --surface-solid: #1e293b;
        --glass-border: rgba(148, 163, 184, 0.12);
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --accent: #38bdf8;
        --accent-dim: rgba(56, 189, 248, 0.15);
        --success: #4ade80;
        --danger: #f87171;
        --warning: #fbbf24;
        --input-bg: rgba(15, 23, 42, 0.65);
        --topbar-bg: rgba(17, 24, 39, 0.72);
      }

      .admin-root.theme-light {
        --bg0: #f0f4f8;
        --bg1: #e2e8f0;
        --surface: rgba(255, 255, 255, 0.72);
        --surface-solid: #ffffff;
        --glass-border: rgba(15, 23, 42, 0.08);
        --text: #0f172a;
        --text-muted: #64748b;
        --accent: #0284c7;
        --accent-dim: rgba(2, 132, 199, 0.1);
        --success: #16a34a;
        --danger: #dc2626;
        --warning: #d97706;
        --input-bg: rgba(255, 255, 255, 0.95);
        --topbar-bg: rgba(255, 255, 255, 0.82);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--font-sans);
        background: linear-gradient(145deg, var(--bg0) 0%, var(--bg1) 48%, var(--bg0) 100%);
        background-attachment: fixed;
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* Prevent unwanted text selection/caret on admin UI */
      body,
      h1,
      h2,
      h3,
      h4,
      p,
      span,
      strong,
      div,
      article,
      section,
      button,
      a,
      label {
        -webkit-user-select: none;
        user-select: none;
        caret-color: transparent;
      }

      input,
      textarea,
      select,
      option {
        -webkit-user-select: text;
        user-select: text;
        caret-color: auto;
      }

      .glass {
        background: var(--surface);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow);
      }

      .glass-strong {
        background: var(--surface);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow-lg);
      }

      /* ——— Login ——— */
      .login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        animation: fadeIn 0.45s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .login-card {
        width: 100%;
        max-width: 420px;
        border-radius: calc(var(--radius) + 4px);
        padding: 2rem 2rem 1.75rem;
        animation: slideUp 0.5s ease;
      }

      .login-card h1 {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.35rem;
        letter-spacing: -0.02em;
      }

      .login-card .sub {
        color: var(--text-muted);
        font-size: 0.875rem;
        margin: 0 0 1.5rem;
        line-height: 1.5;
      }

      .login-card label {
        display: block;
        font-size: 0.7rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      .login-card input {
        width: 100%;
        margin-bottom: 1rem;
      }

      /* ——— App shell ——— */
      .app-shell {
        display: flex;
        min-height: 100vh;
        animation: fadeIn 0.35s ease;
      }

      .sidebar {
        width: var(--sidebar-w);
        flex-shrink: 0;
        padding: 1.25rem 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        border-right: 1px solid var(--glass-border);
      }

      .sidebar-brand {
        padding: 0.5rem 0.85rem 1.25rem;
        border-bottom: 1px solid var(--glass-border);
        margin-bottom: 0.5rem;
      }

      .sidebar-brand .logo {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: -0.02em;
      }

      .sidebar-brand .tag {
        font-size: 0.7rem;
        color: var(--text-muted);
        margin-top: 0.2rem;
      }

      .nav-btn {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        width: 100%;
        padding: 0.65rem 0.9rem;
        border: none;
        border-radius: var(--radius-sm);
        background: transparent;
        color: var(--text-muted);
        font: inherit;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        text-align: left;
        transition: background var(--transition), color var(--transition), transform 0.15s ease;
      }

      .nav-btn:hover {
        background: var(--accent-dim);
        color: var(--text);
        transform: translateX(2px);
      }

      .nav-btn.active {
        background: var(--accent-dim);
        color: var(--accent);
        font-weight: 600;
      }

      .nav-btn .ico {
        width: 1.25rem;
        text-align: center;
        opacity: 0.85;
      }

      .sidebar-foot {
        margin-top: auto;
        padding-top: 1rem;
        border-top: 1px solid var(--glass-border);
      }

      .main-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        padding: 0.85rem 1.35rem;
        border-bottom: 1px solid var(--glass-border);
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        background: var(--topbar-bg);
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .menu-toggle {
        display: none;
        width: 42px;
        height: 42px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        font-size: 1.1rem;
      }

      .save-status {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-muted);
        padding: 0.35rem 0.75rem;
        border-radius: 999px;
        background: var(--accent-dim);
      }

      .save-status.saving {
        color: var(--warning);
      }

      .save-status.saved {
        color: var(--success);
      }

      .save-status.error {
        color: var(--danger);
      }

      .save-status .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        opacity: 0.85;
      }

      .topbar-actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        padding: 0.55rem 1.1rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--surface);
        color: var(--text);
        font: inherit;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow var(--transition), background var(--transition);
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #0ea5e9);
        border-color: transparent;
        color: #fff;
      }

      .theme-light .btn-primary {
        color: #fff;
      }

      .btn-ghost {
        background: transparent;
      }

      .btn-danger {
        border-color: rgba(248, 113, 113, 0.35);
        color: var(--danger);
        background: rgba(248, 113, 113, 0.08);
      }

      .btn-icon {
        width: 42px;
        height: 42px;
        padding: 0;
        border-radius: var(--radius-sm);
      }

      .main-scroll {
        flex: 1;
        overflow: auto;
        padding: 1.35rem 1.5rem 2.5rem;
        animation: slideUp 0.4s ease;
      }

      .page-head {
        margin-bottom: 1.35rem;
      }

      .page-head h2 {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.35rem;
        letter-spacing: -0.02em;
      }

      .page-head p {
        margin: 0;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .grid-kpi {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      @media (max-width: 1100px) {
        .grid-kpi {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 520px) {
        .grid-kpi {
          grid-template-columns: 1fr;
        }
      }

      .kpi-card {
        border-radius: var(--radius);
        padding: 1.15rem 1.25rem;
        transition: transform var(--transition), box-shadow var(--transition);
      }

      .kpi-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-lg);
      }

      .kpi-card .label {
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      .kpi-card .value {
        font-family: var(--font-display);
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .kpi-card .hint {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-top: 0.35rem;
      }

      .card {
        border-radius: var(--radius);
        padding: 1.25rem 1.35rem;
        margin-bottom: 1rem;
        transition: box-shadow var(--transition);
      }

      .card:hover {
        box-shadow: var(--shadow);
      }

      .section-title {
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 600;
        margin: 0 0 1rem;
        color: var(--text);
      }

      .toolbar-inline {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
        align-items: center;
        margin-bottom: 1rem;
      }

      .search-input {
        flex: 1;
        min-width: 180px;
        max-width: 320px;
        padding: 0.55rem 0.85rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        color: var(--text);
        font: inherit;
        font-size: 0.875rem;
      }

      .search-input:focus {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      select.filter-select {
        padding: 0.55rem 0.75rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        color: var(--text);
        font: inherit;
        font-size: 0.8rem;
        cursor: pointer;
      }

      label.floating-label {
        display: block;
        font-size: 0.68rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        margin-bottom: 0.35rem;
      }

      input.field,
      textarea.field {
        width: 100%;
        padding: 0.55rem 0.75rem;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        color: var(--text);
        font: inherit;
        font-size: 0.875rem;
        transition: border-color var(--transition), box-shadow var(--transition);
      }

      input.field:focus,
      textarea.field:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }

      textarea.field {
        min-height: 4.5rem;
        resize: vertical;
      }

      .row-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.85rem;
      }

      @media (max-width: 640px) {
        .row-2 {
          grid-template-columns: 1fr;
        }
      }

      .item {
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        padding: 1rem 1.1rem;
        margin-bottom: 0.75rem;
        background: var(--input-bg);
        transition: border-color var(--transition);
      }

      .item:hover {
        border-color: rgba(56, 189, 248, 0.25);
      }

      .item-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 0.75rem;
        margin-bottom: 0.85rem;
        flex-wrap: wrap;
      }

      .item-head strong {
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
      }

      table.data-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }

      .data-table th,
      .data-table td {
        padding: 0.75rem 1rem;
        text-align: left;
        border-bottom: 1px solid var(--glass-border);
      }

      .data-table th {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        font-weight: 600;
        background: var(--accent-dim);
      }

      .data-table tr:last-child td {
        border-bottom: none;
      }

      .data-table tbody tr {
        transition: background var(--transition);
      }

      .data-table tbody tr:hover {
        background: var(--accent-dim);
      }

      .empty-hint {
        text-align: center;
        padding: 2rem 1rem;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .help-text {
        margin: -0.5rem 0 0.75rem;
        font-size: 0.85rem;
        color: var(--text-muted);
      }

      .pill {
        display: inline-block;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 600;
        background: var(--accent-dim);
        color: var(--accent);
      }

      /* Uploader (shared) */
      .uploader {
        --uploader-w: 72px;
        --uploader-h: 72px;
        display: flex;
        gap: 0.65rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .uploader-preview {
        width: var(--uploader-w);
        height: var(--uploader-h);
        border-radius: var(--radius-sm);
        border: 1px solid var(--glass-border);
        background: var(--input-bg);
        overflow: hidden;
        flex: 0 0 auto;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 0.75rem;
      }

      .uploader-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .uploader-status {
        position: absolute;
        right: 8px;
        bottom: 8px;
        display: none;
      }

      .uploader-drop {
        flex: 1;
        min-height: var(--uploader-h);
        border-radius: var(--radius-sm);
        border: 1px dashed var(--glass-border);
        background: rgba(2, 132, 199, 0.05);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.65rem 0.75rem;
        min-width: 220px;
      }

      .uploader-drop .title {
        font-weight: 700;
      }

      .uploader-drop .sub {
        color: var(--text-muted);
        font-size: 0.8rem;
      }

      .uploader-drop.is-dragover {
        border-color: rgba(56, 189, 248, 0.55);
        background: rgba(56, 189, 248, 0.06);
      }

      @media (max-width: 520px) {
        .uploader-drop {
          min-width: 100%;
        }
      }

      .doctor-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      .doctor-chip {
        border-radius: var(--radius-sm);
        padding: 0.75rem 1rem;
        min-width: 140px;
        flex: 1 1 160px;
        max-width: 220px;
        transition: transform var(--transition), box-shadow var(--transition);
      }

      .doctor-chip:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
      }

      .doctor-chip .n {
        font-weight: 600;
        font-size: 0.88rem;
        margin-bottom: 0.2rem;
      }

      .doctor-chip .r {
        font-size: 0.75rem;
        color: var(--text-muted);
      }

      .quick-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.85rem;
      }

      @media (max-width: 720px) {
        .quick-grid {
          grid-template-columns: 1fr;
        }
      }

      .analytics-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
      }

      .stat-block {
        border-radius: var(--radius-sm);
        padding: 1rem 1.1rem;
        text-align: center;
      }

      .stat-block .num {
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 700;
        color: var(--accent);
      }

      .stat-block .lbl {
        font-size: 0.8rem;
        color: var(--text-muted);
        margin-top: 0.25rem;
      }

      /* Mobile sidebar */
      @media (max-width: 900px) {
        .menu-toggle {
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }

        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          z-index: 100;
          transform: translateX(-102%);
          transition: transform var(--transition);
          box-shadow: var(--shadow-lg);
        }

        .sidebar.open {
          transform: translateX(0);
        }

        .sidebar-backdrop {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.45);
          z-index: 99;
          backdrop-filter: blur(2px);
        }

        .sidebar-backdrop.show {
          display: block;
        }
      }

      /* Toasts */
      .toast-stack {
        position: fixed;
        bottom: 1.25rem;
        right: 1.25rem;
        z-index: 200;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        max-width: min(400px, 92vw);
        pointer-events: none;
      }

      .toast {
        padding: 0.75rem 1.1rem;
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        font-weight: 500;
        box-shadow: var(--shadow-lg);
        transform: translateX(120%);
        opacity: 0;
        transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1), opacity 0.3s ease;
        pointer-events: auto;
        border: 1px solid var(--glass-border);
      }

      .toast.show {
        transform: translateX(0);
        opacity: 1;
      }

      .toast.ok {
        background: rgba(22, 101, 52, 0.92);
        color: #ecfdf5;
        border-color: rgba(74, 222, 128, 0.35);
      }

      .toast.err {
        background: rgba(127, 29, 29, 0.92);
        color: #fef2f2;
        border-color: rgba(248, 113, 113, 0.35);
      }

      .login-error {
        color: var(--danger);
        font-size: 0.85rem;
        margin-top: 0.5rem;
      }

      a.link-site {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.875rem;
      }

      a.link-site:hover {
        text-decoration: underline;
      }

      .hidden {
        display: none !important;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }

      .login-card code,
      .sub code {
        font-size: 0.85em;
        padding: 0.1em 0.35em;
        border-radius: 4px;
        background: var(--accent-dim);
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div id="loginScreen" class="login-screen">
      <div class="login-card glass-strong">
        <h1>Pearly Smile</h1>
        <p class="sub">Clinic console — manage public site content. Saves to <code>api/data.json</code> on the server.</p>
        <label for="u">Username</label>
        <input id="u" class="field" autocomplete="username" />
        <label for="p">Password</label>
        <input id="p" class="field" type="password" autocomplete="current-password" />
        <p class="sub" style="margin-bottom: 1rem; font-size: 0.8rem">

    <script>
      (function () {
        const TOKEN_KEY = "ps_admin_token";
        const THEME_KEY = "ps_admin_theme";

        const apiBase = (function () {
          try {
            return location.protocol === "file:" ? "http://127.0.0.1:8000" : location.origin;
          } catch (e) {
            return "http://127.0.0.1:8000";
          }
        })();

        let state = null;
        let token = sessionStorage.getItem(TOKEN_KEY);
        let activeRoute = "overview";
        let dirty = false;
        let saveState = "saved";

        const $ = (id) => document.getElementById(id);

        function setTheme(dark) {
          const root = document.documentElement;
          root.classList.toggle("theme-dark", dark);
          root.classList.toggle("theme-light", !dark);
          localStorage.setItem(THEME_KEY, dark ? "dark" : "light");
        }

        function initTheme() {
          const t = localStorage.getItem(THEME_KEY);
          if (t === "light") setTheme(false);
          else setTheme(true);
        }
        initTheme();

        $("btnTheme").addEventListener("click", () => {
          const dark = !document.documentElement.classList.contains("theme-dark");
          setTheme(dark);
        });

        function markDirty() {
          dirty = true;
          saveState = "unsaved";
          updateSaveStatus();
        }

        function markSaved() {
          dirty = false;
          saveState = "saved";
          updateSaveStatus();
        }

        function updateSaveStatus() {
          const el = $("saveStatus");
          const txt = $("saveStatusText");
          el.classList.remove("saving", "saved", "error");
          if (saveState === "saving") {
            el.classList.add("saving");
            txt.textContent = "Saving…";
          } else if (saveState === "error") {
            el.classList.add("error");
            txt.textContent = "Save failed";
          } else if (dirty) {
            txt.textContent = "Unsaved changes";
          } else {
            el.classList.add("saved");
            txt.textContent = "Saved";
          }
        }

        function showToast(msg, ok) {
          const stack = $("toastStack");
          const t = document.createElement("div");
          t.className = "toast " + (ok ? "ok" : "err");
          t.textContent = msg;
          stack.appendChild(t);
          requestAnimationFrame(() => t.classList.add("show"));
          setTimeout(() => {
            t.classList.remove("show");
            setTimeout(() => t.remove(), 350);
          }, 3200);
        }

        function authHeaders() {
          const h = { "Content-Type": "application/json" };
          if (token) h["Authorization"] = "Bearer " + token;
          return h;
        }

        async function apiGet() {
          const r = await fetch(apiBase + "/api/data");
          if (!r.ok) throw new Error("Failed to load data");
          return r.json();
        }

        async function apiSave(body) {
          const r = await fetch(apiBase + "/api/data", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(body),
          });
          if (r.status === 401) {
            token = null;
            sessionStorage.removeItem(TOKEN_KEY);
            throw new Error("Session expired — sign in again");
          }
          if (!r.ok) {
            const t = await r.text();
            throw new Error(t || "Save failed");
          }
          return r.json();
        }

        async function apiLogin(user, pass) {
          const r = await fetch(apiBase + "/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: user, password: pass }),
          });
          if (!r.ok) throw new Error("Invalid credentials");
          const j = await r.json();
          return j.token;
        }

        // -----------------------------
        // Bookings API (separate store)
        // -----------------------------
        let bookingsCache = [];

        async function apiGetBookings() {
          const r = await fetch(apiBase + "/api/bookings", { headers: authHeaders() });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to load bookings");
          const rows = await r.json();
          return Array.isArray(rows) ? rows : [];
        }

        async function apiUpsertBooking(booking) {
          const r = await fetch(apiBase + "/api/bookings", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(booking),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) {
            const t = await r.text();
            throw new Error(t || "Failed to save booking");
          }
          return r.json();
        }

        async function apiDeleteBooking(id) {
          const r = await fetch(apiBase + "/api/bookings/" + encodeURIComponent(id), {
            method: "DELETE",
            headers: authHeaders(),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (r.status === 404) throw new Error("Booking not found");
          if (!r.ok) throw new Error("Failed to delete booking");
          return r.json();
        }

        async function refreshBookings() {
          bookingsCache = await apiGetBookings();
          return bookingsCache;
        }

        // -----------------------------
        // Events API (separate store)
        // -----------------------------
        async function apiPostEvent(evt) {
          try {
            const r = await fetch(apiBase + "/api/events", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify(evt),
            });
            return r.ok;
          } catch (e) {
            return false;
          }
        }

        async function apiGetEvents() {
          const r = await fetch(apiBase + "/api/events", { headers: authHeaders() });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to load events");
          const rows = await r.json();
          return Array.isArray(rows) ? rows : [];
        }

        // -----------------------------
        // Blog API (separate store)
        // -----------------------------
        async function apiAdminGetBlog() {
          const r = await fetch(apiBase + "/api/admin/blog", { headers: authHeaders() });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) throw new Error("Failed to load blog posts");
          const rows = await r.json();
          return Array.isArray(rows) ? rows : [];
        }

        async function apiAdminCreateBlog(post) {
          const r = await fetch(apiBase + "/api/admin/blog", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(post),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (r.status === 409) throw new Error("Slug already exists");
          if (!r.ok) throw new Error("Failed to create post");
          return r.json();
        }

        async function apiAdminUpdateBlog(slug, post) {
          const r = await fetch(apiBase + "/api/admin/blog/" + encodeURIComponent(slug), {
            method: "PUT",
            headers: authHeaders(),
            body: JSON.stringify(post),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (r.status === 409) throw new Error("Slug already exists");
          if (r.status === 404) throw new Error("Post not found");
          if (!r.ok) throw new Error("Failed to update post");
          return r.json();
        }

        async function apiAdminDeleteBlog(slug) {
          const r = await fetch(apiBase + "/api/admin/blog/" + encodeURIComponent(slug), {
            method: "DELETE",
            headers: authHeaders(),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (r.status === 404) throw new Error("Post not found");
          if (!r.ok) throw new Error("Failed to delete post");
          return r.json();
        }

        async function apiGenerateBlog(topic) {
          const r = await fetch(apiBase + "/api/generate-blog", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({ topic: topic || null }),
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) {
            let msg = "Failed to generate blog";
            try {
              const j = await r.json();
              if (j && j.detail) msg = String(j.detail);
            } catch (e) {}
            throw new Error(msg);
          }
          return r.json();
        }

        function track(type, fields) {
          apiPostEvent(Object.assign({ type }, fields || {}));
        }

        async function uploadImageFile(file) {
          const fd = new FormData();
          fd.append("file", file);
          const r = await fetch(apiBase + "/api/upload", {
            method: "POST",
            headers: token ? { Authorization: "Bearer " + token } : {},
            body: fd,
          });
          if (r.status === 401) throw new Error("Session expired — sign in again");
          if (!r.ok) {
            let msg = "Upload failed";
            try {
              const j = await r.json();
              if (j && j.detail) msg = String(j.detail);
            } catch (e) {}
            throw new Error(msg);
          }
          const j = await r.json();
          if (!j || !j.url) throw new Error("Upload failed: missing url");
          // Return absolute URL for convenience
          return j.url.startsWith("http") ? j.url : apiBase + j.url;
        }

        function createImageUploader(opts) {
          const get = opts.get;
          const set = opts.set;
          const label = opts.label || "Image";
          const size = opts.size || { w: 72, h: 72 };

          const wrap = document.createElement("div");
          const lab = document.createElement("span");
          lab.className = "floating-label";
          lab.textContent = label;
          wrap.appendChild(lab);

          const row = document.createElement("div");
          row.className = "uploader";
          row.style.setProperty("--uploader-w", String(size.w) + "px");
          row.style.setProperty("--uploader-h", String(size.h) + "px");

          const preview = document.createElement("div");
          preview.className = "uploader-preview";

          const status = document.createElement("span");
          status.className = "pill uploader-status";
          preview.appendChild(status);

          const drop = document.createElement("div");
          drop.className = "uploader-drop";
          drop.innerHTML =
            '<div style="min-width:0"><div class="title">Drag & drop</div><div class="sub">or use the button</div></div>';

          const inp = document.createElement("input");
          inp.type = "file";
          inp.accept = "image/*";
          inp.style.display = "none";

          const btnUp = document.createElement("button");
          btnUp.type = "button";
          btnUp.className = "btn btn-ghost";

          const btnClear = document.createElement("button");
          btnClear.type = "button";
          btnClear.className = "btn btn-ghost";
          btnClear.textContent = "Remove";

          let localPreviewUrl = "";
          let busy = false;

          function paintPreview() {
            const url = get() ? String(get()) : "";
            const showUrl = localPreviewUrl || url;
            preview.querySelectorAll("img").forEach((n) => n.remove());
            const oldTxt = preview.querySelector(".uploader-empty");
            if (oldTxt) oldTxt.remove();

            if (showUrl) {
              const img = document.createElement("img");
              img.alt = "";
              img.src = showUrl;
              preview.insertBefore(img, status);
              btnUp.textContent = "Change image";
            } else {
              const t = document.createElement("div");
              t.className = "uploader-empty";
              t.textContent = "No image";
              preview.insertBefore(t, status);
              btnUp.textContent = "Upload image";
            }
          }

          function setStatus(kind, text) {
            status.style.display = "inline-block";
            status.textContent = text;
            if (kind === "warn") {
              status.style.background = "rgba(251, 191, 36, 0.15)";
              status.style.color = "var(--warning)";
            } else if (kind === "ok") {
              status.style.background = "rgba(74, 222, 128, 0.14)";
              status.style.color = "var(--success)";
            } else if (kind === "err") {
              status.style.background = "rgba(248, 113, 113, 0.14)";
              status.style.color = "var(--danger)";
            } else {
              status.style.background = "var(--accent-dim)";
              status.style.color = "var(--accent)";
            }
          }

          async function handleFile(file) {
            if (!file) return;
            if (busy) return;
            busy = true;
            btnUp.disabled = true;
            btnClear.disabled = true;
            setStatus("warn", "Uploading…");

            if (localPreviewUrl) {
              try {
                URL.revokeObjectURL(localPreviewUrl);
              } catch (e) {}
              localPreviewUrl = "";
            }
            try {
              localPreviewUrl = URL.createObjectURL(file);
            } catch (e) {
              localPreviewUrl = "";
            }
            paintPreview();

            try {
              const url = await uploadImageFile(file);
              set(url);
              if (localPreviewUrl) {
                try {
                  URL.revokeObjectURL(localPreviewUrl);
                } catch (e) {}
                localPreviewUrl = "";
              }
              paintPreview();
              markDirty();
              showToast("Image uploaded", true);
              setStatus("ok", "Saved");
              setTimeout(() => (status.style.display = "none"), 1400);
            } catch (e) {
              showToast(e.message || "Upload failed", false);
              setStatus("err", "Failed");
            }

            busy = false;
            btnUp.disabled = false;
            btnClear.disabled = false;
          }

          btnUp.addEventListener("click", () => inp.click());
          inp.addEventListener("change", () => {
            const file = inp.files && inp.files[0];
            inp.value = "";
            handleFile(file);
          });

          btnClear.addEventListener("click", () => {
            set("");
            if (localPreviewUrl) {
              try {
                URL.revokeObjectURL(localPreviewUrl);
              } catch (e) {}
              localPreviewUrl = "";
            }
            paintPreview();
            markDirty();
          });

          drop.addEventListener("dragover", (e) => {
            e.preventDefault();
            drop.classList.add("is-dragover");
          });
          drop.addEventListener("dragleave", () => {
            drop.classList.remove("is-dragover");
          });
          drop.addEventListener("drop", (e) => {
            e.preventDefault();
            drop.classList.remove("is-dragover");
            const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
            handleFile(file);
          });

          paintPreview();

          row.appendChild(preview);
          row.appendChild(drop);
          row.appendChild(btnUp);
          row.appendChild(btnClear);
          wrap.appendChild(row);
          wrap.appendChild(inp);
          return wrap;
        }

        function ensureHomeAboutShape(st) {
          if (!st.homeAbout || typeof st.homeAbout !== "object") {
            st.homeAbout = {};
          }
          const ha = st.homeAbout;
          ["eyebrow", "title", "description", "highlightsLabel"].forEach((k) => {
            if (!ha[k]) ha[k] = { ar: "", en: "" };
          });
          if (!ha.visual || typeof ha.visual !== "object") ha.visual = {};
          ["kicker", "sub", "chip"].forEach((k) => {
            if (!ha.visual[k]) ha.visual[k] = { ar: "", en: "" };
          });
          if (ha.visual.image == null) ha.visual.image = "";
          if (!ha.cta || typeof ha.cta !== "object") ha.cta = {};
          ["primaryLabel", "secondaryLabel", "tertiaryLabel"].forEach((k) => {
            if (!ha.cta[k]) ha.cta[k] = { ar: "", en: "" };
          });
          if (!ha.cta.primaryHref) ha.cta.primaryHref = "#booking";
          if (!ha.cta.secondaryHref) ha.cta.secondaryHref = "about.html";
          if (!ha.cta.tertiaryHref) ha.cta.tertiaryHref = "#stats";
          if (!Array.isArray(ha.pills)) ha.pills = [];
          if (!Array.isArray(ha.cards)) ha.cards = [];
          if (!Array.isArray(ha.tags)) ha.tags = [];
        }

        function flattenHomeAboutForAdmin(st) {
          ensureHomeAboutShape(st);
          st.homeAboutPills = st.homeAbout.pills.slice();
          st.homeAboutCards = st.homeAbout.cards.slice();
          st.homeAboutTags = st.homeAbout.tags.slice();
        }

        function nestHomeAboutBeforeSave(st) {
          if (!st.homeAbout) st.homeAbout = {};
          if (Array.isArray(st.homeAboutPills)) st.homeAbout.pills = JSON.parse(JSON.stringify(st.homeAboutPills));
          if (Array.isArray(st.homeAboutCards)) st.homeAbout.cards = JSON.parse(JSON.stringify(st.homeAboutCards));
          if (Array.isArray(st.homeAboutTags)) st.homeAbout.tags = JSON.parse(JSON.stringify(st.homeAboutTags));
        }

        function prepareStateForSave(st) {
          nestHomeAboutBeforeSave(st);
          const payload = JSON.parse(JSON.stringify(st));
          delete payload.homeAboutPills;
          delete payload.homeAboutCards;
          delete payload.homeAboutTags;
          return payload;
        }

        const navItems = [
          { id: "overview", label: "Overview", icon: "◈" },
          { id: "stats", label: "Statistics", icon: "▤" },
          { id: "homepage", label: "Homepage", icon: "⌂" },
          { id: "services", label: "Services", icon: "◇" },
          { id: "doctors", label: "Doctors", icon: "◎" },
          { id: "offers", label: "Offers", icon: "★" },
          { id: "bookings", label: "Bookings", icon: "▣" },
          { id: "blog", label: "Blog", icon: "✎" },
          { id: "analytics", label: "Analytics", icon: "◧" },
        ];

        function renderSidebar() {
          const nav = $("sidebarNav");
          nav.innerHTML = "";
          navItems.forEach((item) => {
            const b = document.createElement("button");
            b.type = "button";
            b.className = "nav-btn" + (item.id === activeRoute ? " active" : "");
            b.innerHTML = '<span class="ico">' + item.icon + "</span> " + item.label;
            b.addEventListener("click", () => navigate(item.id));
            nav.appendChild(b);
          });

        function setPageHead(title, subtitle) {
          $("pageHead").innerHTML =
            "<h2>" +
            escapeHtml(title) +
            "</h2>" +
            (subtitle ? "<p>" + escapeHtml(subtitle) + "</p>" : "");
        }

        function escapeHtml(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function field(label, value, onInput) {
          const wrap = document.createElement("div");
          const lab = document.createElement("span");
          lab.className = "floating-label";
          lab.textContent = label;
          const inp = document.createElement("input");
          inp.className = "field";
          inp.value = value != null ? String(value) : "";
          inp.addEventListener("input", () => {
            onInput(inp.value);
            markDirty();
          });
          wrap.appendChild(lab);
          wrap.appendChild(inp);
          return wrap;
        }

        function textLang(labelAr, labelEn, obj, onChange) {
          const wrap = document.createElement("div");
          wrap.className = "row-2";
          const a = document.createElement("div");
          const b = document.createElement("div");
          const la = document.createElement("span");
          la.className = "floating-label";
          la.textContent = labelAr;
          const ta = document.createElement("textarea");
          ta.className = "field";
          ta.value = (obj && obj.ar) || "";
          ta.addEventListener("input", () => {
            onChange("ar", ta.value);
            markDirty();
          });
          const lb = document.createElement("span");
          lb.className = "floating-label";
          lb.textContent = labelEn;
          const tb = document.createElement("textarea");
          tb.className = "field";
          tb.value = (obj && obj.en) || "";
          tb.addEventListener("input", () => {
            onChange("en", tb.value);
            markDirty();
          });
          a.appendChild(la);
          a.appendChild(ta);
          b.appendChild(lb);
          b.appendChild(tb);
          wrap.appendChild(a);
          wrap.appendChild(b);
          return wrap;
        }

          search.placeholder = "Search title, tag, slug…";
          toolbar.appendChild(search);

          const btnNew = document.createElement("button");
          btnNew.type = "button";
          btnNew.className = "btn btn-primary";
          btnNew.textContent = "+ New post";
          toolbar.appendChild(btnNew);

          const btnAi = document.createElement("button");
          btnAi.type = "button";
          btnAi.className = "btn btn-ghost";
          btnAi.textContent = "Generate AI Blog";
          toolbar.appendChild(btnAi);
          shell.appendChild(toolbar);

          const listHost = document.createElement("div");
          shell.appendChild(listHost);

          const editor = document.createElement("div");
          editor.className = "card glass";
          editor.innerHTML = '<h3 class="section-title">Editor</h3>';
          root.appendChild(editor);

          let posts = [];
          let active = null;

          function slugify(s) {
            s = String(s || "").trim().toLowerCase();
            let out = "";
            let dash = false;
            for (const ch of s) {
              const ok = (ch >= "a" && ch <= "z") || (ch >= "0" && ch <= "9");
              if (ok) {
                out += ch;
                dash = false;
              } else if (!dash) {
                out += "-";
                dash = true;
              }
            }
            out = out.replace(/^-+|-+$/g, "");
            return out || "post-" + Date.now();
          }

          function paintList() {
            listHost.innerHTML = "";
            const q = String(search.value || "").trim().toLowerCase();
            const rows = posts.filter((p) => {
              if (!p) return false;
              if (!q) return true;
              const hay = JSON.stringify(p).toLowerCase();
              return hay.includes(q);
            });
            if (!rows.length) {
              listHost.innerHTML = '<div class="empty-hint">No posts yet.</div>';
              return;
            }
            const tw = document.createElement("div");
            tw.className = "table-wrap";
            tw.innerHTML =
              '<table class="data-table"><thead><tr><th>Title</th><th>Slug</th><th>Tag</th><th>Status</th><th>Updated</th><th></th></tr></thead><tbody>' +
              rows

        function renderAnalytics(root) {
          setPageHead("Analytics", "Actionable analytics from real user events + bookings.");

          const toolbar = document.createElement("div");

          refreshBtn.addEventListener("click", () => renderAnalytics(root));
          toolbar.appendChild(refreshBtn);
          root.appendChild(toolbar);

          if (window.__psAnalyticsRefresh) {
            clearInterval(window.__psAnalyticsRefresh);
            window.__psAnalyticsRefresh = null;
          }
          window.__psAnalyticsRefresh = setInterval(() => {
            if (typeof activeRoute !== "undefined" && activeRoute !== "analytics") {
              clearInterval(window.__psAnalyticsRefresh);

              return;

            renderAnalytics(root);
          }, 45000);

          const host = document.createElement("div");
          host.innerHTML = '<div class="card glass"><div class="empty-hint">Loading events…</div></div>';
          root.appendChild(host);

          function isoDayUtc(iso) {
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return "";
            const y = d.getUTCFullYear();
            const m = String(d.getUTCMonth() + 1).padStart(2, "0");
            const dd = String(d.getUTCDate()).padStart(2, "0");
            return y + "-" + m + "-" + dd;
          }

          function drawLine(canvas, labels, values, color) {
            const ctx = canvas.getContext("2d");
            if (!ctx) return;
            const w = canvas.width;
            const h = canvas.height;
            ctx.clearRect(0, 0, w, h);

            const pad = 18;
            const max = Math.max(1, ...values);
            const n = Math.max(2, values.length);
            const xFor = (i) => pad + (i * (w - pad * 2)) / (n - 1);
            const yFor = (v) => h - pad - (v * (h - pad * 2)) / (max || 1);

            ctx.strokeStyle = "rgba(148,163,184,0.18)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(pad, h - pad);
            ctx.lineTo(w - pad, h - pad);
            ctx.stroke();

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            values.forEach((v, i) => {
              const x = xFor(i);
              const y = yFor(v);
              if (i === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            });
            ctx.stroke();

            ctx.fillStyle = color;
            values.forEach((v, i) => {
              const x = xFor(i);
              const y = yFor(v);
              ctx.beginPath();
              ctx.arc(x, y, 2.5, 0, Math.PI * 2);
              ctx.fill();
            });

            ctx.fillStyle = "rgba(148,163,184,0.85)";
            ctx.font = "12px Inter, system-ui, sans-serif";
            if (labels.length) {
              ctx.fillText(String(labels[0]), pad, h - 4);
              const last = String(labels[labels.length - 1]);
              const tw = ctx.measureText(last).width;
              ctx.fillText(last, w - pad - tw, h - 4);
            }
          }

          function lastNDaysSeries(map, n) {
            const days = [];
            const vals = [];
            const now = new Date();
            for (let i = n - 1; i >= 0; i--) {
              const d = new Date(Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate()));
              d.setUTCDate(d.getUTCDate() - i);
              const key = isoDayUtc(d.toISOString());
              days.push(key.slice(5)); // MM-DD
              vals.push(map[key] || 0);
            }
            return { days, vals };
          }

          apiGetEvents()
            .then((events) => {
              host.innerHTML = "";

              const sessions = new Set();
              let totalEvents = 0;
              let pageViews = 0;
              const pageCounts = Object.create(null);
              const doctorClicks = Object.create(null);
              const serviceClicks = Object.create(null);
              const offerViews = Object.create(null);
              let offerViewEvents = 0;
              const bookingCompletedSessions = new Set();
              const dailyEvents = Object.create(null);
              const perSessionEvents = Object.create(null);

              (events || []).forEach((ev) => {
                if (!ev || typeof ev !== "object") return;
                totalEvents += 1;
                if (ev.session_id) sessions.add(String(ev.session_id));

                if (ev.type === "page_view") {
                  pageViews += 1;
                  const p = String(ev.page || "unknown");
                  pageCounts[p] = (pageCounts[p] || 0) + 1;
                }
                if (ev.type === "doctor_click") {
                  const d = String(ev.doctor || "Unknown").trim();
                  doctorClicks[d] = (doctorClicks[d] || 0) + 1;
                }
                if (ev.type === "service_click") {
                  const s = String(ev.service || "Unknown").trim();
                  serviceClicks[s] = (serviceClicks[s] || 0) + 1;
                }
                if (ev.type === "offer_view") {
                  offerViewEvents += 1;
                  const oid = String(ev.offer_id || "unknown").trim();
                  offerViews[oid] = (offerViews[oid] || 0) + 1;
                }
                if (ev.type === "booking_completed" && ev.session_id) {
                  bookingCompletedSessions.add(String(ev.session_id));
                }

                const day = isoDayUtc(ev.timestamp || "");
                if (day) dailyEvents[day] = (dailyEvents[day] || 0) + 1;

                // For strict funnel + time-to-conversion analytics
                const sid = ev.session_id ? String(ev.session_id) : "";
                if (sid) {
                  const ts = Date.parse(String(ev.timestamp || ""));
                  if (!Number.isNaN(ts)) {
                    (perSessionEvents[sid] || (perSessionEvents[sid] = [])).push({
                      type: String(ev.type || ""),
                      ts,
                    });
                  }
                }
              });

              const totalSessions = sessions.size;
              const totalBookings = bookings.length;
              const conversionRate = totalSessions ? totalBookings / totalSessions : 0;
              const dropOffRate = totalSessions ? (totalSessions - bookingCompletedSessions.size) / totalSessions : 0;

              function normPath(p) {
                return String(p || "").trim().toLowerCase();
              }
              function countPageViewsIf(pred) {
                let n = 0;
                (events || []).forEach((ev2) => {
                  if (!ev2 || ev2.type !== "page_view") return;
                  if (pred(normPath(ev2.page))) n += 1;
                });
                return n;
              }
              const kpiOffersPageViews = countPageViewsIf((p) => p.includes("offers"));
              const kpiServicesPageViews = countPageViewsIf((p) => p.includes("services") || p.includes("service-"));
              const kpiBlogPageViews = countPageViewsIf((p) => p.includes("blog"));

              function pct(n, d) {
                if (!d) return 0;
                return (n / d) * 100;
              }

              function fmtMs(ms) {
                if (!Number.isFinite(ms) || ms < 0) return "—";
                const s = Math.round(ms / 1000);
                const m = Math.floor(s / 60);
                const h = Math.floor(m / 60);
                const mm = m % 60;
                const ss = s % 60;
                if (h > 0) return h + "h " + String(mm).padStart(2, "0") + "m";
                if (m > 0) return m + "m " + String(ss).padStart(2, "0") + "s";
                return ss + "s";
              }

              // Strict funnel progression per session:
              // page_view → doctor_click → booking_started → booking_completed
              const strict = {
                step1: new Set(),
                step2: new Set(),
                step3: new Set(),
                step4: new Set(),
                times: Object.create(null), // session_id -> {pv, dc, bs, bc}
              };

              Object.keys(perSessionEvents).forEach((sid) => {
                const evs = perSessionEvents[sid];
                if (!Array.isArray(evs) || evs.length === 0) return;
                evs.sort((a, b) => a.ts - b.ts);

                let pv = null;
                let dc = null;
                let bs = null;
                let bc = null;

                for (let i = 0; i < evs.length; i++) {
                  const e = evs[i];
                  if (!pv && e.type === "page_view") {
                    pv = e.ts;
                    continue;
                  }
                  if (pv && !dc && e.type === "doctor_click" && e.ts >= pv) {
                    dc = e.ts;
                    continue;
                  }
                  if (dc && !bs && e.type === "booking_started" && e.ts >= dc) {
                    bs = e.ts;
                    continue;
                  }
                  if (bs && !bc && e.type === "booking_completed" && e.ts >= bs) {
                    bc = e.ts;
                    break;
                  }
                }

                if (pv) {
                  strict.step1.add(sid);
                  strict.times[sid] = { pv, dc, bs, bc };
                }
                if (pv && dc) strict.step2.add(sid);
                if (pv && dc && bs) strict.step3.add(sid);
                if (pv && dc && bs && bc) strict.step4.add(sid);
              });

              const funnel = [
                { key: "page_view", label: "Visited (page_view)", sessions: strict.step1 },
                { key: "doctor_click", label: "Clicked doctor", sessions: strict.step2 },
                { key: "booking_started", label: "Started booking", sessions: strict.step3 },
                { key: "booking_completed", label: "Completed booking", sessions: strict.step4 },
              ];

              const funnelBase = strict.step1.size;

              const bookingsPerDoctor = Object.create(null);
              const bookingsPerService = Object.create(null);
              const dailyBookings = Object.create(null);

              bookings.forEach((b) => {
                const d = String(b.doctor || "Unknown").trim();
                bookingsPerDoctor[d] = (bookingsPerDoctor[d] || 0) + 1;
                const s = String(b.service || "Unknown").trim();
                bookingsPerService[s] = (bookingsPerService[s] || 0) + 1;
                const day = (b.date || "").trim() || isoDayUtc(b.timestamp || "");
                if (day) dailyBookings[day] = (dailyBookings[day] || 0) + 1;
              });

              // Funnel visualization (strict progression)
              const funnelCard = document.createElement("div");
              funnelCard.className = "card glass";
              funnelCard.style.marginTop = "1rem";
              funnelCard.innerHTML =
                '<h3 class="section-title">Funnel</h3><p style="margin:-0.5rem 0 1rem;font-size:0.85rem;color:var(--text-muted)">Session flow: <code>page_view → doctor_click → booking_started → booking_completed</code></p>';

              if (!funnelBase) {
                funnelCard.innerHTML += '<div class="empty-hint">No page views tracked yet.</div>';
              } else {
                const rows = document.createElement("div");
                rows.style.display = "grid";
                rows.style.gap = "0.75rem";

                funnel.forEach((step, idx) => {
                  const count = step.sessions.size;
                  const prev = idx === 0 ? funnelBase : funnel[idx - 1].sessions.size;
                  const stepRate = idx === 0 ? 100 : pct(count, prev);
                  const overallRate = pct(count, funnelBase);
                  const barPct = pct(count, funnelBase);

                  const row = document.createElement("div");
                  row.className = "item";
                  row.style.marginBottom = "0";
                  row.innerHTML =
                    '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.75rem;flex-wrap:wrap">' +
                    '<div><div style="font-weight:700">' +
                    escapeHtml(step.label) +
                    '</div><div style="margin-top:0.15rem;font-size:0.8rem;color:var(--text-muted)">' +
                    escapeHtml(String(count)) +
                    ' sessions · ' +
                    (idx === 0
                      ? "100% of visitors"
                      : escapeHtml(stepRate.toFixed(1) + "% step") + " · " + escapeHtml(overallRate.toFixed(1) + "% overall")) +
                    "</div></div>" +
                    '<div class="pill" style="white-space:nowrap">' +
                    escapeHtml(overallRate.toFixed(1) + "%") +
                    "</div>" +
                    "</div>" +
                    '<div style="margin-top:0.65rem;height:10px;border-radius:999px;overflow:hidden;border:1px solid var(--glass-border);background:rgba(148,163,184,0.12)">' +
                    '<div style="height:100%;width:' +
                    escapeHtml(String(Math.max(0, Math.min(100, barPct)).toFixed(1))) +
                    '%;background:linear-gradient(90deg,var(--accent),rgba(56,189,248,0.35))"></div></div>';
                  rows.appendChild(row);
                });

                funnelCard.appendChild(rows);

                // Explicit percentages requested
                const pClickedDoctor = pct(strict.step2.size, strict.step1.size);
                const pStartedBooking = pct(strict.step3.size, strict.step1.size);
                const pCompletedBooking = pct(strict.step4.size, strict.step1.size);
                const note = document.createElement("div");
                note.style.marginTop = "0.85rem";
                note.style.fontSize = "0.85rem";
                note.style.color = "var(--text-muted)";
                note.innerHTML =
                  "<div><strong style=\"color:var(--text)\">Visitors →</strong> " +

              function avg(arr) {
                if (!arr || !arr.length) return NaN;
                let sum = 0;

              }

                const viewToComplete = funnelBase ? completed / funnelBase : 0;

                // 1) Conversion issues: doctor_click high but booking low
                if (clicked >= 20 && clickToComplete < 0.2) {

                  });

                  recs.push("Make booking CTA more prominent on doctor sections (sticky CTA, clearer ‘Next available time’, WhatsApp/call fallback).");
                } else if (clicked >= 10 && clickToComplete < 0.35) {
                  insights.push({
                    sev: "yellow",
                    title: "Conversion opportunity",
                    text:
                      "Many users click doctors, but a smaller portion completes booking. Small UX improvements could lift conversion.",
                  });
                  recs.push("Reduce booking friction: fewer fields, better defaults, and inline validation/feedback.");
                } else if (clicked >= 10 && clickToComplete >= 0.35) {
                  insights.push({
                    sev: "green",
                    title: "Doctor conversion looks healthy",
                    text: "Users who click doctors often proceed to booking completion. Keep iterating on what’s working.",
                  });

                // 2) Service issues: high service_click but low bookings
                const totalServiceClicks = Object.values(serviceClicks).reduce((a, b) => a + b, 0);
                const serviceToBooking = totalServiceClicks ? totalBookings / totalServiceClicks : 0;
                if (totalServiceClicks >= 30 && serviceToBooking < 0.08) {
                  insights.push({
                    sev: "red",
                    title: "Service interest not converting",
                    text:
                      "Services are being clicked frequently, but bookings remain low. This often means pricing/info is unclear or the value isn’t landing.",
                  });

                  recs.push("Add stronger service CTAs: ‘Book this service’ buttons on service cards and detail pages.");
                } else if (totalServiceClicks >= 15 && serviceToBooking < 0.15) {
                  insights.push({
                    sev: "yellow",
                    title: "Service conversion opportunity",
                    text:
                      "Service clicks are solid, but bookings could be higher. Improve clarity and reduce decision anxiety.",

                // 2b) Offers: impressions vs funnel completion
                if (offerViewEvents >= 25 && funnelBase >= 30 && viewToComplete < 0.08) {
                  insights.push({
                    sev: "yellow",
                    title: "Offer visibility not converting",
                    text:
                      "Users are seeing offers, but few strict journeys end in a completed booking. Add stronger CTAs from offer cards to booking with the right doctor/service preselected.",
                  });
                  recs.push("Link each offer card to a one-click booking preset (doctor/service/date hints) and repeat the offer details inside the booking flow.");

                // 3) Biggest drop-off step in funnel (strict)
                const d1 = pct(strict.step1.size - strict.step2.size, strict.step1.size);

                  const sev = top.value >= 55 ? "red" : top.value >= 35 ? "yellow" : "green";
                  insights.push({
                    sev,
                    title: "Biggest drop-off",
                    text: top.label + " is the largest leakage point (" + top.value.toFixed(1) + "%).",
                  });
                  if (top.key === "visit→click") {
                    recs.push("Make doctors more discoverable on landing pages: above-the-fold doctor highlights + social proof + clear ‘Choose a doctor’ prompt.");

                  } else if (top.key === "start→complete") {
                    recs.push("Fix booking completion friction: simplify form, ensure mobile-friendly inputs, and make submission feedback immediate.");
                  }

                // 4) Recommendations (limit 2–3, dedupe)
                const seen = new Set();

              } else {
                offersCard.innerHTML +=
                  '<div class="table-wrap"><table class="data-table"><thead><tr><th>Offer ID</th><th>Views</th><th>Share</th></tr></thead><tbody>' +
                  offerRows
                    .slice(0, 20)
                    .map(([id, n]) => {
                      const share = offerViewEvents ? ((n / offerViewEvents) * 100).toFixed(1) + "%" : "—";
                      return "<tr><td>" + escapeHtml(id) + "</td><td>" + escapeHtml(String(n)) + "</td><td>" + escapeHtml(share) + "</td></tr>";
                    })
                    .join("") +
                  "</tbody></table></div>";
                if (offerRows.length > 1) {
                  const tail = offerRows.slice(-5).reverse();
                  offersCard.innerHTML +=
                    '<h4 style="margin:1rem 0 0.5rem;font-size:0.95rem;color:var(--text)">Lowest visibility</h4>' +
                    '<div class="table-wrap"><table class="data-table"><thead><tr><th>Offer ID</th><th>Views</th></tr></thead><tbody>' +
                    tail.map(([id, n]) => "<tr><td>" + escapeHtml(id) + "</td><td>" + escapeHtml(String(n)) + "</td></tr>").join("") +
                    "</tbody></table></div>";
                }
              }
              host.appendChild(offersCard);
            })
            .catch((e) => {
              host.innerHTML = '<div class="card glass"><div class="empty-hint">' + escapeHtml(e.message || "Failed to load events") + "</div></div>";
            });
        }

        const routes = {
          overview: renderOverview,
          stats: renderStats,
          homepage: renderHomepageTab,
          services: renderServicesTab,
          doctors: renderDoctorsTab,
          offers: renderOffersTab,
          bookings: renderBookings,
          blog: renderBlog,
          analytics: renderAnalytics,
        };

        function navigate(id) {
          if (window.__psAnalyticsRefresh) {
            clearInterval(window.__psAnalyticsRefresh);
            window.__psAnalyticsRefresh = null;
          }
          activeRoute = id;
          renderSidebar();
          const main = $("mainContent");
          main.innerHTML = "";
          const fn = routes[id];
          if (fn && state) fn(main);
          closeSidebarMobile();
          track("page_visit", { service: id });
        }

        function closeSidebarMobile() {
          $("sidebar").classList.remove("open");
          $("sidebarBackdrop").classList.remove("show");
        }

        $("menuToggle").addEventListener("click", () => {
          $("sidebar").classList.toggle("open");
          $("sidebarBackdrop").classList.toggle("show");
        });
        $("sidebarBackdrop").addEventListener("click", closeSidebarMobile);

        function showDash() {
          $("loginScreen").classList.add("hidden");
          $("appDash").classList.remove("hidden");
          renderSidebar();
          navigate(activeRoute);
          markSaved();
          track("page_visit", { service: "dashboard" });
        }

        function showLogin() {
          $("appDash").classList.add("hidden");
          $("loginScreen").classList.remove("hidden");
          closeSidebarMobile();
        }

        $("btnLogin").addEventListener("click", async () => {
          $("loginErr").textContent = "";
          try {
            token = await apiLogin($("u").value.trim(), $("p").value);
            sessionStorage.setItem(TOKEN_KEY, token);
            state = await apiGet();
            flattenHomeAboutForAdmin(state);
            await refreshBookings();
            showDash();
            showToast("Welcome back", true);
          } catch (e) {
            $("loginErr").textContent = e.message || "Login failed";
          }
        });

        $("btnLogout").addEventListener("click", () => {
          token = null;
          sessionStorage.removeItem(TOKEN_KEY);
          state = null;
          showLogin();
        });

        $("btnReload").addEventListener("click", async () => {
          try {
            state = await apiGet();
            flattenHomeAboutForAdmin(state);
            await refreshBookings();
            navigate(activeRoute);
            markSaved();
            showToast("Reloaded from server", true);
          } catch (e) {
            saveState = "error";
            updateSaveStatus();
            showToast(e.message, false);
          }
        });

        $("btnSave").addEventListener("click", async () => {
          saveState = "saving";
          updateSaveStatus();
          try {
            await apiSave(prepareStateForSave(state));
            saveState = "saved";
            markSaved();
            showToast("Saved · refresh the public site to publish", true);
          } catch (e) {
            saveState = "error";
            updateSaveStatus();
            showToast(e.message, false);
          }
        });

        async function bootstrap() {
          if (token) {
            try {
              state = await apiGet();
              flattenHomeAboutForAdmin(state);
              await refreshBookings();
              showDash();
              return;
            } catch (e) {
              token = null;
              sessionStorage.removeItem(TOKEN_KEY);
            }
          }
          showLogin();
        }

        bootstrap();
      })();
    </script>
  </body>
</html>
